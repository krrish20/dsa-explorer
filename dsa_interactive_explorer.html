<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6afff0;
    --accent4: #ffd06a;
    --text: #e8e8f0;
    --muted: #7070a0;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font-head); min-height: 100vh; }

  #app { max-width: 860px; margin: 0 auto; padding-bottom: 40px; }

  .header { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
  .header h1 span { color: var(--accent); }

  .tabs { display: flex; gap: 0; overflow-x: auto; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { padding: 12px 16px; font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; white-space: nowrap; font-family: var(--font-head); transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { padding: 24px; }

  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .topic-btn { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 12px; cursor: pointer; text-align: center; transition: all 0.2s; font-family: var(--font-head); }
  .topic-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .topic-btn.active { border-color: var(--accent); background: #1e1a3a; }
  .topic-btn .icon { font-size: 22px; margin-bottom: 8px; }
  .topic-btn .name { font-size: 12px; font-weight: 700; color: var(--text); }
  .topic-btn .complexity { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: var(--font-mono); }

  .demo-area { margin-top: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .demo-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .demo-desc { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; font-family: var(--font-mono); }

  .viz-area { min-height: 120px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

  .arr-box { display: flex; gap: 4px; align-items: flex-end; }
  .arr-cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px; font-weight: 700; font-family: var(--font-mono); border: 1.5px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.3s; }
  .arr-cell.highlight { background: #2a1f5e; border-color: var(--accent); color: var(--accent); }
  .arr-cell.compare { background: #2a1028; border-color: var(--accent2); color: var(--accent2); }
  .arr-cell.sorted { background: #0f2a28; border-color: var(--accent3); color: var(--accent3); }
  .arr-cell.pivot { background: #2a2010; border-color: var(--accent4); color: var(--accent4); }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font-head); transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #6a58ee; }

  .info-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-family: var(--font-mono); font-weight: 700; margin-right: 6px; }
  .badge-time { background: #1f1a40; color: var(--accent); }
  .badge-space { background: #0f2020; color: var(--accent3); }
  .badge-step { background: #201010; color: var(--accent2); margin-left: auto; }

  .log { font-size: 11px; font-family: var(--font-mono); color: var(--muted); margin-top: 12px; min-height: 20px; padding: 8px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); }

  .tree-svg { width: 100%; }
  .stack-viz { display: flex; flex-direction: column-reverse; gap: 4px; align-items: center; }
  .queue-viz { display: flex; flex-direction: row; gap: 4px; align-items: center; }
  .stack-item { width: 120px; padding: 10px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px; text-align: center; font-family: var(--font-mono); font-size: 13px; font-weight: 700; transition: all 0.3s; }
  .stack-item.top { border-color: var(--accent); color: var(--accent); background: #1e1a3a; }
  .stack-item.front { border-color: var(--accent3); color: var(--accent3); background: #0f2a28; }
  .stack-item.back { border-color: var(--accent2); color: var(--accent2); background: #2a1028; }

  .hash-table { display: grid; gap: 4px; }
  .hash-row { display: flex; gap: 6px; align-items: center; font-family: var(--font-mono); font-size: 12px; }
  .hash-idx { width: 28px; color: var(--muted); text-align: right; flex-shrink: 0; }
  .hash-cell { flex: 1; padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; min-height: 30px; transition: all 0.3s; }
  .hash-cell.filled { border-color: var(--accent); color: var(--accent); background: #1e1a3a; }
  .hash-cell.collision { border-color: var(--accent4); color: var(--accent4); background: #201a08; }

  .speed-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  input[type=range].speed { width: 80px; }

  .linked-viz { display: flex; align-items: center; gap: 0; flex-wrap: wrap; }
  .ln-node { display: flex; align-items: center; }
  .ln-box { padding: 8px 12px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px; font-family: var(--font-mono); font-size: 13px; font-weight: 700; transition: all 0.3s; }
  .ln-box.head { border-color: var(--accent); color: var(--accent); }
  .ln-box.tail { border-color: var(--accent3); color: var(--accent3); }
  .ln-arrow { color: var(--muted); font-size: 18px; margin: 0 4px; }

  .dp-table { display: inline-grid; gap: 3px; }
  .dp-cell { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-family: var(--font-mono); font-size: 12px; font-weight: 700; background: var(--surface); border: 1px solid var(--border); transition: all 0.3s; color: var(--muted); }
  .dp-cell.filled { background: #1e1a3a; border-color: var(--accent); color: var(--accent); }
  .dp-cell.current { background: #2a1028; border-color: var(--accent2); color: var(--accent2); }
  .dp-cell.header { background: transparent; border-color: transparent; color: var(--muted); font-size: 10px; }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .bar-viz { display: flex; align-items: flex-end; gap: 4px; height: 100px; }
  .bar { border-radius: 4px 4px 0 0; background: var(--surface); border: 1.5px solid var(--border); transition: all 0.3s; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 3px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); min-width: 28px; }
  .bar.highlight { background: #2a1f5e; border-color: var(--accent); color: var(--accent); }
  .bar.sorted { background: #0f2a28; border-color: var(--accent3); color: var(--accent3); }
  .bar.pivot { background: #2a2010; border-color: var(--accent4); color: var(--accent4); }
  .bar.compare { background: #2a1028; border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>DSA <span>Explorer</span></h1>
    <p style="font-size: 12px; color: var(--muted); font-family: var(--font-mono); margin-top: 4px;">Interactive visualizations for every concept</p>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" onclick="switchTab('sorting')">Sorting</div>
    <div class="tab" onclick="switchTab('searching')">Searching</div>
    <div class="tab" onclick="switchTab('ds')">Data Structures</div>
    <div class="tab" onclick="switchTab('trees')">Trees</div>
    <div class="tab" onclick="switchTab('graphs')">Graphs</div>
    <div class="tab" onclick="switchTab('dp')">Dynamic Prog.</div>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
const DELAY = ms => new Promise(r => setTimeout(r, ms));
let animating = false;
let speedMs = 400;

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>{
    const tabs = ['sorting','searching','ds','trees','graphs','dp'];
    el.classList.toggle('active', tabs[i]===t);
  });
  animating = false;
  const fns = {sorting:renderSorting, searching:renderSearching, ds:renderDS, trees:renderTrees, graphs:renderGraphs, dp:renderDP};
  fns[t]();
}

const algos = [
  {id:'bubble', name:'Bubble Sort', icon:'🫧', time:'O(n²)', space:'O(1)'},
  {id:'selection', name:'Selection Sort', icon:'🎯', time:'O(n²)', space:'O(1)'},
  {id:'insertion', name:'Insertion Sort', icon:'🃏', time:'O(n²)', space:'O(1)'},
  {id:'merge', name:'Merge Sort', icon:'🔀', time:'O(n log n)', space:'O(n)'},
  {id:'quick', name:'Quick Sort', icon:'⚡', time:'O(n log n)', space:'O(log n)'},
  {id:'heap', name:'Heap Sort', icon:'🏔️', time:'O(n log n)', space:'O(1)'},
];
let sortAlgo = 'bubble';
let sortArr = [5,3,8,1,9,2,7,4,6];
let sortSteps = 0;

function renderSorting() {
  document.getElementById('content').innerHTML = `
    <div class="section-label">Choose Algorithm</div>
    <div class="topic-grid" id="algo-grid"></div>
    <div class="demo-area" id="sort-demo">
      <div class="demo-title" id="sort-title">Bubble Sort</div>
      <div class="demo-desc" id="sort-desc">Repeatedly swaps adjacent elements if they are in the wrong order.</div>
      <div class="viz-area" id="sort-viz"></div>
      <div class="controls">
        <button class="btn primary" onclick="runSort()">▶ Visualize</button>
        <button class="btn" onclick="resetSort()">↺ Reset</button>
        <button class="btn" onclick="shuffleSort()">⤮ Shuffle</button>
        <div class="speed-row">Speed: <input type="range" class="speed" min="50" max="800" value="400" oninput="speedMs=800-this.value+50"></div>
        <span class="info-badge badge-step" id="step-badge">steps: 0</span>
      </div>
      <div class="log" id="sort-log">Press Visualize to start...</div>
    </div>`;

  const grid = document.getElementById('algo-grid');
  algos.forEach(a => {
    const d = document.createElement('div');
    d.className = 'topic-btn' + (a.id===sortAlgo?' active':'');
    d.innerHTML = `<div class="icon">${a.icon}</div><div class="name">${a.name}</div><div class="complexity">${a.time}</div>`;
    d.onclick = () => { sortAlgo=a.id; animating=false; document.querySelectorAll('#algo-grid .topic-btn').forEach(b=>b.classList.remove('active')); d.classList.add('active'); updateSortInfo(); resetSort(); };
    grid.appendChild(d);
  });
  updateSortInfo();
  drawSortBars(sortArr, [], [], []);
}

function updateSortInfo() {
  const a = algos.find(x=>x.id===sortAlgo);
  if(!a) return;
  document.getElementById('sort-title').textContent = a.name;
  const descs = {
    bubble:'Repeatedly swaps adjacent elements that are in the wrong order. Simple but slow.',
    selection:'Finds the minimum element and places it at the correct position each pass.',
    insertion:'Builds sorted portion one element at a time by inserting each into its place.',
    merge:'Divides array in half recursively, then merges sorted halves back together.',
    quick:'Picks a pivot, partitions elements around it, recursively sorts each side.',
    heap:'Builds a max-heap, then extracts elements in sorted order.'
  };
  document.getElementById('sort-desc').textContent = descs[sortAlgo];
  document.getElementById('sort-log').textContent = `Time: ${a.time} | Space: ${a.space} — Press Visualize`;
}

function drawSortBars(arr, highlights=[], compares=[], sorted=[]) {
  const viz = document.getElementById('sort-viz');
  if(!viz) return;
  const max = Math.max(...arr);
  viz.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'bar-viz';
  arr.forEach((v,i) => {
    const b = document.createElement('div');
    b.className = 'bar' + (highlights.includes(i)?' highlight':'') + (compares.includes(i)?' compare':'') + (sorted.includes(i)?' sorted':'');
    b.style.height = Math.round((v/max)*90) + 'px';
    b.textContent = v;
    wrap.appendChild(b);
  });
  viz.appendChild(wrap);
}

function setLog(msg) { const l = document.getElementById('sort-log'); if(l) l.textContent = msg; }
function setSteps(n) { sortSteps=n; const b = document.getElementById('step-badge'); if(b) b.textContent = 'steps: '+n; }

async function runSort() {
  if(animating) return;
  animating = true;
  sortSteps = 0;
  let arr = [...sortArr];
  const sorted = [];

  if(sortAlgo==='bubble') {
    for(let i=0;i<arr.length&&animating;i++) {
      for(let j=0;j<arr.length-i-1&&animating;j++) {
        setLog(`Comparing arr[${j}]=${arr[j]} and arr[${j+1}]=${arr[j+1]}`);
        drawSortBars(arr,[j],[j+1],Array.from({length:i},(_,k)=>arr.length-1-k));
        await DELAY(speedMs); setSteps(++sortSteps);
        if(arr[j]>arr[j+1]) { [arr[j],arr[j+1]]=[arr[j+1],arr[j]]; setLog(`Swapped! → [${arr}]`); drawSortBars(arr,[j+1],[j],Array.from({length:i},(_,k)=>arr.length-1-k)); await DELAY(speedMs/2); }
      }
      sorted.push(arr.length-1-i);
    }
  } else if(sortAlgo==='selection') {
    for(let i=0;i<arr.length&&animating;i++) {
      let min=i;
      for(let j=i+1;j<arr.length&&animating;j++) {
        setLog(`Comparing arr[${j}]=${arr[j]} with min=${arr[min]}`);
        drawSortBars(arr,[min],[j],[...sorted]);
        await DELAY(speedMs); setSteps(++sortSteps);
        if(arr[j]<arr[min]) min=j;
      }
      [arr[i],arr[min]]=[arr[min],arr[i]];
      sorted.push(i);
      setLog(`Placed ${arr[i]} at position ${i}`);
      drawSortBars(arr,[],[],[...sorted]); await DELAY(speedMs);
    }
  } else if(sortAlgo==='insertion') {
    for(let i=1;i<arr.length&&animating;i++) {
      let key=arr[i], j=i-1;
      while(j>=0&&arr[j]>key&&animating) {
        setLog(`Moving ${arr[j]} right to make room for ${key}`);
        arr[j+1]=arr[j]; j--;
        drawSortBars(arr,[j+1],[i],[]); await DELAY(speedMs); setSteps(++sortSteps);
      }
      arr[j+1]=key;
      setLog(`Inserted ${key} at position ${j+1}`);
      drawSortBars(arr,[j+1],[],[]); await DELAY(speedMs/2);
    }
    drawSortBars(arr,[],[],arr.map((_,i)=>i));
  } else if(sortAlgo==='merge') {
    async function merge(a, l, m, r) {
      let left=a.slice(l,m+1), right=a.slice(m+1,r+1), i=0,j=0,k=l;
      while(i<left.length&&j<right.length&&animating) {
        setLog(`Merging: comparing ${left[i]} and ${right[j]}`);
        drawSortBars(a,[k],[],[]); await DELAY(speedMs); setSteps(++sortSteps);
        if(left[i]<=right[j]) a[k++]=left[i++]; else a[k++]=right[j++];
      }
      while(i<left.length) a[k++]=left[i++];
      while(j<right.length) a[k++]=right[j++];
    }
    async function mergeSort(a, l, r) {
      if(l>=r||!animating) return;
      let m=Math.floor((l+r)/2);
      await mergeSort(a,l,m); await mergeSort(a,m+1,r);
      await merge(a,l,m,r);
      drawSortBars(a,[],[],[]); await DELAY(speedMs/2);
    }
    await mergeSort(arr,0,arr.length-1);
    drawSortBars(arr,[],[],arr.map((_,i)=>i));
  } else if(sortAlgo==='quick') {
    const viz = document.getElementById('sort-viz');
    async function partition(a,lo,hi) {
      let pivot=a[hi], i=lo-1;
      for(let j=lo;j<hi&&animating;j++) {
        setLog(`Pivot=${pivot}. Comparing arr[${j}]=${a[j]}`);
        const piv=[hi], comp=[j], high=[i>=lo?i:-1].filter(x=>x>=0);
        const barWrap = viz.querySelector('.bar-viz');
        if(barWrap) { barWrap.querySelectorAll('.bar').forEach((b,idx)=>{ b.className='bar'+(piv.includes(idx)?' pivot':'')+(comp.includes(idx)?' compare':'')+(high.includes(idx)?' highlight':''); }); }
        await DELAY(speedMs); setSteps(++sortSteps);
        if(a[j]<pivot) { i++; [a[i],a[j]]=[a[j],a[i]]; setLog(`Swap arr[${i}] and arr[${j}]`); }
      }
      [a[i+1],a[hi]]=[a[hi],a[i+1]];
      return i+1;
    }
    async function quickSort(a,lo,hi) {
      if(lo>=hi||!animating) return;
      drawSortBars(a,[],[hi],[]);
      let p=await partition(a,lo,hi);
      drawSortBars(a,[p],[],[p]); await DELAY(speedMs/2);
      await quickSort(a,lo,p-1); await quickSort(a,p+1,hi);
    }
    await quickSort(arr,0,arr.length-1);
    drawSortBars(arr,[],[],arr.map((_,i)=>i));
  } else if(sortAlgo==='heap') {
    async function heapify(a,n,i) {
      let largest=i, l=2*i+1, r=2*i+2;
      if(l<n&&a[l]>a[largest]) largest=l;
      if(r<n&&a[r]>a[largest]) largest=r;
      if(largest!==i) { setLog(`Heapify: swapping ${a[i]} ↔ ${a[largest]}`); [a[i],a[largest]]=[a[largest],a[i]]; drawSortBars(a,[i,largest],[],sorted.map(x=>x)); await DELAY(speedMs); setSteps(++sortSteps); await heapify(a,n,largest); }
    }
    for(let i=Math.floor(arr.length/2)-1;i>=0&&animating;i--) await heapify(arr,arr.length,i);
    for(let i=arr.length-1;i>0&&animating;i--) {
      [arr[0],arr[i]]=[arr[i],arr[0]]; sorted.push(i);
      setLog(`Extracted max=${arr[i]}, placed at index ${i}`);
      drawSortBars(arr,[0],[],[...sorted]); await DELAY(speedMs); setSteps(++sortSteps);
      await heapify(arr,i,0);
    }
    drawSortBars(arr,[],[],arr.map((_,i)=>i));
  }

  if(animating) { setLog('✓ Sorted! Steps: '+sortSteps); animating=false; }
}

function resetSort() { animating=false; setSteps(0); drawSortBars(sortArr,[],[],[]); const l=document.getElementById('sort-log'); if(l) l.textContent='Press Visualize to start...'; }
function shuffleSort() { animating=false; sortArr=[...sortArr].sort(()=>Math.random()-0.5); resetSort(); }

let searchArr = [1,3,5,8,12,15,19,23,28,31,36];
let searchTarget = 19;

function renderSearching() {
  document.getElementById('content').innerHTML = `
    <div class="topic-grid" style="grid-template-columns:repeat(2,1fr);max-width:400px;">
      <div class="topic-btn active" id="btn-linear" onclick="setSearch('linear')"><div class="icon">🔍</div><div class="name">Linear Search</div><div class="complexity">O(n)</div></div>
      <div class="topic-btn" id="btn-binary" onclick="setSearch('binary')"><div class="icon">🎯</div><div class="name">Binary Search</div><div class="complexity">O(log n)</div></div>
    </div>
    <div class="demo-area">
      <div class="demo-title" id="search-title">Linear Search</div>
      <div class="demo-desc" id="search-desc">Checks every element one by one from left to right.</div>
      <div class="viz-area" id="search-viz"></div>
      <div class="controls" style="flex-wrap:wrap;gap:10px;">
        <button class="btn primary" onclick="runSearch()">▶ Search</button>
        <button class="btn" onclick="renderSearching()">↺ Reset</button>
        <span style="font-size:12px;color:var(--muted);font-family:var(--font-mono);">Target:</span>
        <input type="number" id="search-target" value="19" style="width:60px;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-mono);font-size:12px;" min="1" max="40" onchange="searchTarget=+this.value">
        <div class="speed-row">Speed: <input type="range" class="speed" min="50" max="800" value="400" oninput="speedMs=800-this.value+50"></div>
      </div>
      <div class="log" id="search-log">Array is sorted. Enter a target and press Search.</div>
    </div>`;
  drawSearchArr(searchArr,[],[]);
}

let searchAlgo = 'linear';
function setSearch(a) {
  searchAlgo=a;
  document.getElementById('btn-linear').classList.toggle('active',a==='linear');
  document.getElementById('btn-binary').classList.toggle('active',a==='binary');
  const descs={linear:'Checks every element one by one from left to right.',binary:'Divides the sorted array in half each step to narrow the search range.'};
  document.getElementById('search-title').textContent = a==='linear'?'Linear Search':'Binary Search';
  document.getElementById('search-desc').textContent = descs[a];
}

function drawSearchArr(arr, highlights, found) {
  const viz = document.getElementById('search-viz');
  if(!viz) return;
  viz.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'arr-box';
  arr.forEach((v,i)=>{
    const c = document.createElement('div');
    c.className = 'arr-cell'+(found.includes(i)?' sorted':highlights.includes(i)?' highlight':'');
    c.textContent = v;
    wrap.appendChild(c);
  });
  viz.appendChild(wrap);
}

async function runSearch() {
  if(animating) return;
  animating = true;
  const arr = searchArr, target = +document.getElementById('search-target').value;
  const log = t => { const l=document.getElementById('search-log'); if(l) l.textContent=t; };

  if(searchAlgo==='linear') {
    for(let i=0;i<arr.length&&animating;i++) {
      log(`Checking index ${i}: ${arr[i]} ${arr[i]===target?'== TARGET!':'≠ '+target}`);
      drawSearchArr(arr,[i],[]);
      await DELAY(speedMs);
      if(arr[i]===target) { drawSearchArr(arr,[],[i]); log(`✓ Found ${target} at index ${i}!`); animating=false; return; }
    }
    log(`✗ ${target} not found in array.`); animating=false;
  } else {
    let lo=0, hi=arr.length-1;
    while(lo<=hi&&animating) {
      let mid=Math.floor((lo+hi)/2);
      log(`lo=${lo}, hi=${hi}, mid=${mid} → arr[mid]=${arr[mid]}`);
      drawSearchArr(arr,[mid],[]);
      await DELAY(speedMs);
      if(arr[mid]===target) { drawSearchArr(arr,[],[mid]); log(`✓ Found ${target} at index ${mid}!`); animating=false; return; }
      if(arr[mid]<target) { lo=mid+1; log(`${arr[mid]} < ${target}, search right half`); }
      else { hi=mid-1; log(`${arr[mid]} > ${target}, search left half`); }
      await DELAY(speedMs/2);
    }
    log(`✗ ${target} not found.`); animating=false;
  }
}

let hashData = {};
function hashFn(k) { let s=0; for(let c of k) s+=c.charCodeAt(0); return s%8; }

function drawHashTable(data) {
  const viz = document.getElementById('ds-viz'); if(!viz) return;
  viz.innerHTML = '';
  const table = document.createElement('div'); table.className='hash-table'; table.style.width='100%';
  for(let i=0;i<8;i++) {
    const row = document.createElement('div'); row.className='hash-row';
    const idx = document.createElement('div'); idx.className='hash-idx'; idx.textContent=i;
    const cell = document.createElement('div');
    const entries = Object.entries(data).filter(([k])=>hashFn(k)===i);
    cell.className = 'hash-cell'+(entries.length>1?' collision':entries.length===1?' filled':'');
    cell.textContent = entries.map(([k,v])=>`${k}: ${v}`).join(' → ');
    row.appendChild(idx); row.appendChild(cell); table.appendChild(row);
  }
  viz.appendChild(table);
}

function hashInsert() {
  const k = document.getElementById('hash-key').value.trim();
  if(!k) return;
  const val = Math.floor(Math.random()*100)+1;
  hashData[k] = val;
  const idx = hashFn(k);
  const l = document.getElementById('ds-log');
  if(l) l.textContent = `hash("${k}") = ${idx} → inserted {${k}: ${val}}${Object.keys(hashData).filter(x=>hashFn(x)===idx).length>1?' ⚠ collision!':''}`;
  drawHashTable(hashData);
}
function hashLookup() {
  const k = document.getElementById('hash-key').value.trim();
  const l = document.getElementById('ds-log');
  if(!l) return;
  if(hashData[k]!==undefined) l.textContent = `hash("${k}") = ${hashFn(k)} → found ${hashData[k]}`;
  else l.textContent = `"${k}" not found in hash table.`;
}

function drawTree(root, highlighted=[], found=[]) {
  const wrap = document.getElementById('tree-svg-wrap'); if(!wrap) return;
  const W=340, H=200;
  let svg = `<svg class="tree-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  function pos(depth, idx, total) { return {x: W/(total+1)*(idx+1), y: 30+depth*55}; }
  function drawNode(node, depth, idx, total, parentPos) {
    if(!node) return;
    const p = pos(depth,idx,total);
    if(parentPos) svg+=`<line x1="${parentPos.x}" y1="${parentPos.y}" x2="${p.x}" y2="${p.y}" stroke="#2a2a3e" stroke-width="1.5"/>`;
    const isHL = highlighted.includes(node.val), isFound = found.includes(node.val);
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="18" fill="${isFound?'#0f2a28':isHL?'#2a1028':'#1a1a26'}" stroke="${isFound?'#6afff0':isHL?'#ff6a9b':'#7c6aff'}" stroke-width="2"/>`;
    svg+=`<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="central" fill="${isFound?'#6afff0':isHL?'#ff6a9b':'#e8e8f0'}" font-size="11" font-family="JetBrains Mono,monospace" font-weight="700">${node.val}</text>`;
    if(node.left) drawNode(node.left,depth+1,idx*2,total*2,p);
    if(node.right) drawNode(node.right,depth+1,idx*2+1,total*2,p);
  }
  drawNode(root,0,0,1,null);
  svg+='</svg>';
  wrap.innerHTML=svg;
}

function insertBST(node, val) {
  if(!node) return {val,left:null,right:null};
  if(val<node.val) node.left=insertBST(node.left,val);
  else if(val>node.val) node.right=insertBST(node.right,val);
  return node;
}

async function treeAction1() {
  if(treeMode==='bst') {
    const v=+document.getElementById('tree-val').value;
    if(!v) return;
    bst=insertBST(bst,v);
    drawTree(bst,[v],[]);
    document.getElementById('tree-log').textContent=`Inserted ${v} into BST.`;
  } else {
    if(animating) return;
    animating=true;
    const order=[]; const log=document.getElementById('tree-log');
    if(treeMode==='bfs') {
      const queue=[bst]; const visited=[];
      while(queue.length&&animating) {
        const node=queue.shift(); visited.push(node.val);
        drawTree(bst,visited.slice(0,-1),[node.val]);
        if(log) log.textContent=`BFS visiting: ${node.val} | Queue: [${queue.map(x=>x.val)}]`;
        await DELAY(speedMs);
        if(node.left) queue.push(node.left);
        if(node.right) queue.push(node.right);
      }
      if(log) log.textContent=`BFS order: ${visited.join(' → ')}`;
    } else {
      async function dfs(node) { if(!node||!animating) return; order.push(node.val); drawTree(bst,order.slice(0,-1),[node.val]); if(log) log.textContent=`DFS visiting: ${node.val} | Visited: [${order}]`; await DELAY(speedMs); await dfs(node.left); await dfs(node.right); }
      await dfs(bst);
      if(log) log.textContent=`DFS pre-order: ${order.join(' → ')}`;
    }
    animating=false;
  }
}
function treeAction2() {
  if(treeMode==='bst') {
    const v=+document.getElementById('tree-val').value;
    if(!v) return;
    const path=[];
    let cur=bst;
    while(cur) { path.push(cur.val); if(cur.val===v){break;} cur=v<cur.val?cur.left:cur.right; }
    const found=path[path.length-1]===v;
    drawTree(bst,path.slice(0,-1),found?[v]:[]);
    const l=document.getElementById('tree-log');
    if(l) l.textContent=found?`✓ Found ${v} in ${path.length} steps! Path: ${path.join(' → ')}`:`✗ ${v} not found. Path searched: ${path.join(' → ')}`;
  } else { animating=false; drawTree(bst,[],[]); const l=document.getElementById('tree-log'); if(l) l.textContent='Reset.'; }
}

function drawGraph(visited, current, path=[]) {
  const canvas = document.getElementById('graph-canvas'); if(!canvas) return;
  const W=240, H=230;
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  GEDGES.forEach(([a,b])=>{
    const inPath=path.some(([x,y])=>(x===a&&y===b)||(x===b&&y===a));
    svg+=`<line x1="${GPOS[a][0]}" y1="${GPOS[a][1]}" x2="${GPOS[b][0]}" y2="${GPOS[b][1]}" stroke="${inPath?'#7c6aff':'#2a2a3e'}" stroke-width="${inPath?2.5:1.5}"/>`;
  });
  GNODES.forEach(n=>{
    const [x,y]=GPOS[n];
    const isVis=visited.includes(n), isCur=current.includes(n);
    svg+=`<circle cx="${x}" cy="${y}" r="20" fill="${isCur?'#2a1028':isVis?'#0f2a28':'#1a1a26'}" stroke="${isCur?'#ff6a9b':isVis?'#6afff0':'#7c6aff'}" stroke-width="2"/>`;
    svg+=`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" fill="${isCur?'#ff6a9b':isVis?'#6afff0':'#e8e8f0'}" font-size="13" font-family="JetBrains Mono,monospace" font-weight="700">${n}</text>`;
  });
  svg+='</svg>';
  canvas.innerHTML=svg;
}

const ADJ = {A:['B','C'],B:['A','D','E'],C:['A','F'],D:['B','E'],E:['B','D','F'],F:['C','E']};

async function runGraph() {
  if(animating) return;
  animating=true;
  const log=t=>{const l=document.getElementById('graph-log');if(l)l.textContent=t;};
  const visited=[], path=[];
  if(graphAlgo==='bfs') {
    const queue=['A'], seen=new Set(['A']);
    while(queue.length&&animating) {
      const cur=queue.shift(); visited.push(cur);
      drawGraph(visited,[cur],path); log(`BFS visiting ${cur} | Queue: [${queue}] | Visited: [${visited}]`);
      await DELAY(speedMs);
      for(const nb of ADJ[cur]) { if(!seen.has(nb)){seen.add(nb);queue.push(nb);path.push([cur,nb]);} }
    }
    log(`BFS complete: ${visited.join(' → ')}`);
  } else if(graphAlgo==='dfs') {
    const seen=new Set();
    async function dfs(n) { if(!n||seen.has(n)||!animating) return; seen.add(n); visited.push(n); drawGraph(visited,[n],path); log(`DFS visiting ${n} | Visited: [${visited}]`); await DELAY(speedMs); for(const nb of ADJ[n]) { if(!seen.has(nb)){path.push([n,nb]);await dfs(nb);} } }
    await dfs('A'); log(`DFS complete: ${visited.join(' → ')}`);
  } else if(graphAlgo==='dijkstra') {
    const dist={A:0,B:Infinity,C:Infinity,D:Infinity,E:Infinity,F:Infinity};
    const unvis=new Set(GNODES);
    while(unvis.size&&animating) {
      let u=[...unvis].reduce((a,b)=>dist[a]<dist[b]?a:b);
      unvis.delete(u); visited.push(u);
      drawGraph(visited,[u],path); log(`Processing ${u}: dist=${dist[u]} | ${GNODES.map(n=>`${n}:${dist[n]===Infinity?'∞':dist[n]}`).join(', ')}`);
      await DELAY(speedMs);
      for(const nb of ADJ[u]) { if(dist[u]+1<dist[nb]){dist[nb]=dist[u]+1;path.push([u,nb]);} }
    }
    log(`Shortest distances from A: ${GNODES.map(n=>`${n}=${dist[n]}`).join(', ')}`);
  } else {
    const order=[], seen=new Set();
    async function dfs2(n){if(seen.has(n)||!animating)return;seen.add(n);visited.push(n);drawGraph(visited,[n],path);log(`Topo DFS: ${n}`);await DELAY(speedMs);for(const nb of ADJ[n])if(!seen.has(nb)){path.push([n,nb]);await dfs2(nb);}order.unshift(n);}
    for(const n of GNODES) await dfs2(n);
    log(`Topological order: ${order.join(' → ')}`);
  }
  animating=false;
}
function resetGraph() { animating=false; drawGraph([],[]); const l=document.getElementById('graph-log'); if(l)l.textContent='Press Run to animate.'; }

let dpAlgo = 'fib';
function renderDP() {
  document.getElementById('content').innerHTML = `
    <div class="topic-grid" style="grid-template-columns:repeat(3,1fr);max-width:420px;">
      <div class="topic-btn active" id="dp-fib" onclick="setDP('fib')"><div class="icon">🐇</div><div class="name">Fibonacci</div><div class="complexity">O(n)</div></div>
      <div class="topic-btn" id="dp-lis" onclick="setDP('lis')"><div class="icon">📈</div><div class="name">Longest Inc. Subseq.</div><div class="complexity">O(n²)</div></div>
      <div class="topic-btn" id="dp-knapsack" onclick="setDP('knapsack')"><div class="icon">🎒</div><div class="name">0/1 Knapsack</div><div class="complexity">O(nW)</div></div>
    </div>
    <div class="demo-area">
      <div class="demo-title" id="dp-title">Fibonacci (Memoization)</div>
      <div class="demo-desc" id="dp-desc">Cache subproblem results to avoid recomputing. O(n) instead of O(2ⁿ).</div>
      <div class="viz-area" id="dp-viz" style="flex-direction:column;align-items:flex-start;gap:6px;"></div>
      <div class="controls">
        <button class="btn primary" onclick="runDP()">▶ Animate</button>
        <button class="btn" onclick="renderDP()">↺ Reset</button>
        <div class="speed-row">Speed: <input type="range" class="speed" min="50" max="800" value="400" oninput="speedMs=800-this.value+50"></div>
      </div>
      <div class="log" id="dp-log">DP builds up solutions from smaller subproblems.</div>
    </div>`;
  drawFibTable(Array(10).fill(null), -1);
}

function setDP(a) {
  dpAlgo=a; animating=false;
  ['fib','lis','knapsack'].forEach(m=>{const b=document.getElementById('dp-'+m);if(b)b.classList.toggle('active',m===a);});
  const titles={fib:'Fibonacci (Memoization)',lis:'Longest Increasing Subsequence',knapsack:'0/1 Knapsack Problem'};
  const descs={fib:'Cache subproblem results to avoid recomputing. O(n) instead of O(2ⁿ).',lis:'Find the longest subsequence where each element is greater than the previous.',knapsack:'Maximize value of items in a bag without exceeding weight capacity.'};
  document.getElementById('dp-title').textContent=titles[a];
  document.getElementById('dp-desc').textContent=descs[a];
  const viz=document.getElementById('dp-viz'); if(viz) viz.innerHTML='';
  const l=document.getElementById('dp-log'); if(l) l.textContent='Press Animate to visualize.';
  if(a==='fib') drawFibTable(Array(10).fill(null),-1);
  else if(a==='lis') drawLISTable([4,2,8,5,1,9,3,6],Array(8).fill(1),-1);
  else drawKnapsackGrid(Array(4).fill(null).map(()=>Array(7).fill(0)),-1,-1);
}

function drawFibTable(dp, cur) {
  const viz=document.getElementById('dp-viz'); if(!viz) return;
  viz.innerHTML='<div class="section-label">dp[i] = fib(i)</div>';
  const row=document.createElement('div'); row.style.cssText='display:flex;gap:4px;flex-wrap:wrap;';
  dp.forEach((v,i)=>{
    const cell=document.createElement('div'); cell.className='dp-cell'+(i===cur?' current':v!==null?' filled':'');
    cell.style.flexDirection='column'; cell.style.height='48px';
    cell.innerHTML=`<span style="font-size:9px;color:var(--muted)">f(${i})</span><span>${v??''}</span>`;
    row.appendChild(cell);
  });
  viz.appendChild(row);
}

function drawLISTable(arr, dp, cur) {
  const viz=document.getElementById('dp-viz'); if(!viz) return;
  viz.innerHTML='<div class="section-label">Array: ['+arr+'] | dp[i] = LIS ending at i</div>';
  const arrRow=document.createElement('div'); arrRow.style.cssText='display:flex;gap:4px;margin-bottom:6px;';
  arr.forEach((v,i)=>{ const c=document.createElement('div'); c.className='dp-cell'+(i===cur?' current':''); c.textContent=v; arrRow.appendChild(c); });
  const dpRow=document.createElement('div'); dpRow.style.cssText='display:flex;gap:4px;';
  dp.forEach((v,i)=>{ const c=document.createElement('div'); c.className='dp-cell filled'; c.style.cssText='height:32px;font-size:10px;'; c.textContent='L:'+v; dpRow.appendChild(c); });
  viz.appendChild(arrRow); viz.appendChild(dpRow);
}

function drawKnapsackGrid(grid, curI, curW) {
  const viz=document.getElementById('dp-viz'); if(!viz) return;
  viz.innerHTML='<div class="section-label">Items: 3 | Weights: [2,3,4] | Values: [3,4,5] | Capacity: 6</div>';
  const table=document.createElement('div'); table.className='dp-table'; table.style.gridTemplateColumns='repeat(8,36px)';
  const hdr=['i\\w','0','1','2','3','4','5','6'];
  hdr.forEach(h=>{ const c=document.createElement('div'); c.className='dp-cell header'; c.textContent=h; table.appendChild(c); });
  grid.forEach((row,i)=>{ const lbl=document.createElement('div'); lbl.className='dp-cell header'; lbl.textContent='i='+i; table.appendChild(lbl); row.forEach((v,w)=>{ const c=document.createElement('div'); c.className='dp-cell'+(i===curI&&w===curW?' current':v>0?' filled':''); c.textContent=v||''; table.appendChild(c); }); });
  viz.appendChild(table);
}

async function runDP() {
  if(animating) return; animating=true;
  const log=t=>{const l=document.getElementById('dp-log');if(l)l.textContent=t;};
  if(dpAlgo==='fib') {
    const dp=Array(10).fill(null); dp[0]=0; dp[1]=1;
    drawFibTable(dp,1); await DELAY(speedMs);
    for(let i=2;i<10&&animating;i++) { dp[i]=dp[i-1]+dp[i-2]; log(`fib(${i}) = fib(${i-1}) + fib(${i-2}) = ${dp[i-1]} + ${dp[i-2]} = ${dp[i]}`); drawFibTable(dp,i); await DELAY(speedMs); }
    log(`Final: [${dp}]`);
  } else if(dpAlgo==='lis') {
    const arr=[4,2,8,5,1,9,3,6], dp=Array(8).fill(1);
    for(let i=1;i<arr.length&&animating;i++) { for(let j=0;j<i&&animating;j++) { log(`Checking if arr[${j}]=${arr[j]} < arr[${i}]=${arr[i]}: ${arr[j]<arr[i]?'Yes':'No'}`); drawLISTable(arr,dp,i); await DELAY(speedMs/1.5); if(arr[j]<arr[i]) dp[i]=Math.max(dp[i],dp[j]+1); } }
    drawLISTable(arr,dp,-1); log(`LIS lengths: [${dp}] | LIS = ${Math.max(...dp)}`);
  } else {
    const W=[0,2,3,4], V=[0,3,4,5], cap=6;
    const grid=Array(4).fill(null).map(()=>Array(7).fill(0));
    for(let i=1;i<=3&&animating;i++) { for(let w=0;w<=cap&&animating;w++) { if(W[i]<=w) grid[i][w]=Math.max(grid[i-1][w], V[i]+grid[i-1][w-W[i]]); else grid[i][w]=grid[i-1][w]; log(`Item ${i} (w=${W[i]},v=${V[i]}): dp[${i}][${w}] = ${grid[i][w]}`); drawKnapsackGrid(grid,i,w); await DELAY(speedMs/2); } }
    log(`Max value = ${grid[3][6]} for capacity ${cap}`);
  }
  animating=false;
}

renderSorting();
