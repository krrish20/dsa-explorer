<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Explorer | Refined</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg1: #090814;
            --bg2: #1b163d;
            --bg3: #111021;
            --surface: rgba(18, 18, 28, 0.75);
            --surface-hover: rgba(30, 30, 45, 0.85);
            --card: #1e1e2d;
            --border: rgba(124, 106, 255, 0.2);
            --border-acc: rgba(124, 106, 255, 0.6);
            --accent: #9d8cff;
            --accent2: #ff75a0;
            --accent3: #4fffe5;
            --accent4: #ffce54;
            --text: #ffffff;
            --muted: #8b8ba7;
            --font-head: 'Syne', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            background-size: 300% 300%;
            animation: gradientBG 20s ease infinite;
            color: var(--text);
            font-family: var(--font-head);
            min-height: 100vh;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(124, 106, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(124, 106, 255, 0.6);
        }

        #app {
            width: 100%;
            max-width: 960px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            overflow: visible;
        }

        .header {
            padding: 35px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            position: relative;
            background: radial-gradient(ellipse at top, rgba(124, 106, 255, 0.1) 0%, transparent 70%);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 15%;
            right: 15%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(157, 140, 255, 0.3);
            margin-bottom: 8px;
        }

        .header h1 span {
            color: var(--accent);
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.2);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 20px 10px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--muted);
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .tab:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.02);
        }

        .tab.active {
            color: var(--accent);
            background: linear-gradient(to top, rgba(124, 106, 255, 0.1) 0%, transparent 100%);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent);
            box-shadow: 0 -2px 10px var(--accent);
        }

        .content {
            padding: 35px;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, margin 0.3s ease;
            opacity: 0;
            margin-bottom: 0;
            background: rgba(0,0,0,0.2);
            padding: 0 10px;
            border-radius: 16px;
        }

        .topic-grid.expanded {
            max-height: 500px;
            opacity: 1;
            margin-bottom: 25px;
            padding: 20px 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .topic-btn {
            background: rgba(30, 30, 45, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 16px 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .topic-btn:hover {
            border-color: var(--border-acc);
            background: var(--surface-hover);
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(124, 106, 255, 0.15);
        }

        .topic-btn.active {
            border-color: var(--accent);
            background: rgba(124, 106, 255, 0.1);
            box-shadow: 0 0 0 1px var(--accent), 0 8px 25px rgba(124, 106, 255, 0.25);
        }

        .topic-btn .icon {
            font-size: 32px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .topic-btn:hover .icon {
            transform: scale(1.15) translateY(-2px);
        }

        .topic-btn .name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .topic-btn .complexity {
            font-size: 11px;
            color: var(--muted);
            font-family: var(--font-mono);
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .demo-area {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .demo-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .demo-title::before {
            content: '';
            display: block;
            width: 6px;
            height: 24px;
            background: var(--accent);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--accent);
        }

        .demo-desc {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.6;
            max-width: 90%;
        }

        /* Grid Lab Background for Visualization Stage */
        .viz-area {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 10px 30px rgba(0, 0, 0, 0.5);
            background-color: #0b0b12;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: center;
            position: relative;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .viz-area::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 40%, #0b0b12 100%);
            pointer-events: none;
        }

        /* Tactile UI Elements */
        .arr-box {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            position: relative;
            z-index: 1;
        }

        .arr-cell {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            font-family: var(--font-mono);
            background: #1e1e2d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.05);
        }

        .arr-cell.highlight {
            background: rgba(124, 106, 255, 0.2);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-6px) scale(1.1);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5), 0 0 20px rgba(124, 106, 255, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.2);
            z-index: 2;
        }

        .arr-cell.compare {
            background: rgba(255, 117, 160, 0.2);
            border-color: var(--accent2);
            color: var(--accent2);
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 117, 160, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.2);
            z-index: 2;
        }

        .arr-cell.sorted {
            background: rgba(79, 255, 229, 0.1);
            border-color: rgba(79, 255, 229, 0.4);
            color: var(--accent3);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.1);
        }

        .arr-cell.pivot {
            background: rgba(255, 206, 84, 0.2);
            border-color: var(--accent4);
            color: var(--accent4);
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 206, 84, 0.3);
            z-index: 2;
        }

        .controls {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
            background: rgba(20, 20, 30, 0.6);
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(30, 30, 45, 0.8);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-head);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .btn:hover {
            border-color: var(--border-acc);
            background: rgba(45, 40, 70, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .btn.primary {
            background: linear-gradient(135deg, #7c6aff, #c245f3);
            border: none;
            box-shadow: 0 6px 20px rgba(124, 106, 255, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            color: #fff;
            font-weight: 800;
        }

        .btn.primary:hover {
            box-shadow: 0 8px 25px rgba(124, 106, 255, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            filter: brightness(1.15);
        }

        .info-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: var(--font-mono);
            font-weight: 600;
            margin-right: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .badge-step {
            background: rgba(255, 117, 160, 0.1);
            color: var(--accent2);
            margin-left: auto;
            box-shadow: inset 0 0 10px rgba(255, 117, 160, 0.05);
        }

        /* Animated Terminal Log */
        .log {
            font-size: 14px;
            font-family: var(--font-mono);
            color: var(--accent3);
            margin-top: 20px;
            min-height: 50px;
            padding: 16px 20px;
            background: #0b0b12;
            border-radius: 12px;
            border: 1px solid rgba(79, 255, 229, 0.2);
            box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            transition: all 0.1s ease;
        }

        .log::before {
            content: '~$';
            margin-right: 12px;
            color: var(--accent);
            font-size: 14px;
            font-weight: 800;
            opacity: 0.8;
        }

        .log.flash {
            background: rgba(79, 255, 229, 0.1);
            border-color: var(--accent3);
            box-shadow: 0 0 15px rgba(79, 255, 229, 0.2), inset 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .iso-3d {
            /* Interactive 3D variables */
            --rx: 60deg;
            --rz: -45deg;
            transform: perspective(1200px) rotateX(var(--rx)) rotateZ(var(--rz));
            transform-style: preserve-3d;
            transform-origin: center center;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            margin: 60px auto !important;
            cursor: grab;
            user-select: none;
            width: fit-content;
        }
        .iso-3d:active { cursor: grabbing; }
        .iso-3d .dp-cell, .iso-3d .dp-cell.header {
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s;
            box-shadow: -1px 1px 0 #333, -2px 2px 0 #222;
        }
        .iso-3d .dp-cell.filled {
            box-shadow: -1px 1px 0 #5444b0, -2px 2px 0 #4a3a99, -3px 3px 0 #3b2e7a, -4px 4px 6px rgba(0,0,0,0.5);
        }
        .iso-3d .dp-table {
            border: none;
            box-shadow: none;
        }

        .tree-svg {
            width: 100%;
            overflow: visible;
            position: relative;
            z-index: 1;
        }

        /* DS Components Refinements */
        .stack-viz {
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .queue-viz {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .stack-item {
            width: 160px;
            padding: 16px;
            background: #1e1e2d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.05);
            text-wrap: nowrap;
        }

        .stack-item.top {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(124, 106, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(124, 106, 255, 0.2), inset 0 2px 0 rgba(255, 255, 255, 0.1);
            transform: scale(1.05) translateY(-4px);
        }

        .stack-item.front {
            border-color: var(--accent3);
            color: var(--accent3);
            background: rgba(79, 255, 229, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(79, 255, 229, 0.2);
            transform: scale(1.05) translateX(-4px);
        }

        .stack-item.back {
            border-color: var(--accent2);
            color: var(--accent2);
            background: rgba(255, 117, 160, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 117, 160, 0.2);
            transform: scale(1.05) translateX(4px);
        }

        .hash-table {
            display: grid;
            gap: 8px;
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .hash-row {
            display: flex;
            gap: 12px;
            align-items: stretch;
            font-family: var(--font-mono);
            font-size: 14px;
        }

        .hash-idx {
            width: 40px;
            color: var(--accent4);
            text-align: right;
            flex-shrink: 0;
            font-weight: 600;
            padding-top: 12px;
            opacity: 0.8;
        }

        .hash-cell {
            flex: 1;
            padding: 12px 16px;
            background: #1e1e2d;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            min-height: 46px;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .hash-cell.filled {
            border-color: rgba(124, 106, 255, 0.5);
            color: #fff;
            background: rgba(124, 106, 255, 0.1);
        }

        .hash-cell.collision {
            border-color: var(--accent4);
            color: var(--accent4);
            background: rgba(255, 206, 84, 0.1);
            font-weight: 600;
        }

        .speed-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--muted);
            font-family: var(--font-mono);
            font-weight: 600;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-left: auto;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        input[type=range].speed {
            width: 120px;
            accent-color: var(--accent);
            cursor: pointer;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            appearance: none;
        }

        input[type=range].speed::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent);
        }

        .linked-viz {
            display: flex;
            align-items: center;
            gap: 0;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .ln-node {
            display: flex;
            align-items: center;
        }

        .ln-box {
            padding: 14px 20px;
            background: #1e1e2d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.05);
        }

        .ln-box:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .ln-box.head {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(124, 106, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(124, 106, 255, 0.2);
        }

        .ln-box.tail {
            border-color: var(--accent3);
            color: var(--accent3);
            background: rgba(79, 255, 229, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(79, 255, 229, 0.2);
        }

        .ln-arrow {
            color: var(--muted);
            font-size: 20px;
            margin: 0 12px;
            font-weight: 400;
            animation: pulseArrow 2s infinite;
        }

        @keyframes pulseArrow {

            0%,
            100% {
                opacity: 0.5;
                transform: translateX(0);
                color: var(--muted);
            }

            50% {
                opacity: 1;
                transform: translateX(4px);
                color: var(--accent);
            }
        }

        .dp-table {
            display: inline-grid;
            gap: 6px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .dp-cell {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 600;
            background: #1e1e2d;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            color: var(--muted);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .dp-cell.filled {
            background: rgba(124, 106, 255, 0.15);
            border-color: rgba(124, 106, 255, 0.4);
            color: var(--text);
        }

        .dp-cell.current {
            background: rgba(255, 117, 160, 0.2);
            border-color: var(--accent2);
            color: #fff;
            transform: scale(1.15);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 117, 160, 0.3);
            z-index: 2;
            position: relative;
        }

        .dp-cell.header {
            background: transparent;
            border-color: transparent;
            color: var(--accent4);
            font-size: 12px;
            box-shadow: none;
            opacity: 0.8;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            font-family: var(--font-mono);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
            display: block;
            width: 100%;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .bar-viz {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 180px;
            padding: 20px;
            width: 100%;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .bar {
            border-radius: 6px 6px 0 0;
            background: linear-gradient(to top, rgba(30, 30, 45, 0.9), rgba(80, 80, 100, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: none;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s, background 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            min-width: 38px;
            box-shadow: 0 -5px 10px rgba(0, 0, 0, 0.3), inset 0 2px 2px rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        .bar.highlight {
            background: linear-gradient(to top, rgba(124, 106, 255, 0.6), rgba(157, 140, 255, 0.9));
            border-color: #fff;
            color: #fff;
            box-shadow: 0 -8px 25px rgba(124, 106, 255, 0.5), inset 0 2px 5px rgba(255, 255, 255, 0.5);
            transform: translateY(-4px);
            z-index: 2;
        }

        .bar.sorted {
            background: linear-gradient(to top, rgba(79, 255, 229, 0.3), rgba(79, 255, 229, 0.8));
            border-color: rgba(255, 255, 255, 0.5);
            color: #000;
            box-shadow: 0 -5px 15px rgba(79, 255, 229, 0.3);
        }

        .bar.pivot {
            background: linear-gradient(to top, rgba(255, 206, 84, 0.5), rgba(255, 206, 84, 0.9));
            border-color: #fff;
            color: #000;
            box-shadow: 0 -8px 20px rgba(255, 206, 84, 0.4);
            transform: translateY(-2px);
            z-index: 2;
        }

        .bar.compare {
            background: linear-gradient(to top, rgba(255, 117, 160, 0.6), rgba(255, 117, 160, 0.9));
            border-color: #fff;
            color: #fff;
            box-shadow: 0 -8px 20px rgba(255, 117, 160, 0.5);
            transform: translateY(-2px);
            z-index: 2;
        }

        /* Input fields */
        input[type=number],
        input[type=text],
        #hash-key {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: var(--text) !important;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
            font-family: var(--font-mono);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        input[type=number]:focus,
        input[type=text]:focus,
        #hash-key:focus {
            border-color: var(--accent) !important;
            background: rgba(0, 0, 0, 0.7) !important;
            box-shadow: 0 0 0 2px rgba(124, 106, 255, 0.2), inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* ===== Mobile Responsiveness ===== */

        /* Allow viz content to scroll horizontally instead of being clipped */
        #app {
            overflow-x: hidden;
            overflow-y: auto;
        }

        .viz-area {
            overflow: auto;
        }

        .viz-area::after {
            pointer-events: none;
        }

        /* Ensure SVGs scale to fit container */
        .tree-svg,
        svg {
            max-width: 100%;
            height: auto;
        }

        /* DP tables and arrays should scroll when too wide */
        .dp-table {
            overflow-x: auto;
            max-width: 100%;
        }

        .arr-box,
        .linked-viz,
        .queue-viz {
            overflow-x: auto;
            max-width: 100%;
            padding-bottom: 8px;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px 6px;
            }

            #app {
                border-radius: 16px;
            }

            .header {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 26px;
            }

            .header p {
                font-size: 12px;
            }

            .tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .tab {
                padding: 14px 8px;
                font-size: 10px;
                letter-spacing: 0.05em;
                min-width: 0;
                flex: 0 0 auto;
            }

            .content {
                padding: 16px 12px;
            }

            .topic-grid {
                grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
                gap: 8px;
            }

            .topic-btn {
                padding: 12px 8px;
                border-radius: 12px;
            }

            .topic-btn .icon {
                font-size: 24px;
                margin-bottom: 8px;
            }

            .topic-btn .name {
                font-size: 12px;
            }

            .topic-btn .complexity {

                padding: 3px 6px;
            }

            .demo-area {
                padding: 16px 12px;
                border-radius: 14px;
            }

            .demo-title {
                font-size: 18px;
            }

            .demo-desc {
                font-size: 13px;
                max-width: 100%;
            }

            .viz-area {
                padding: 16px 10px;
                min-height: 150px;
                border-radius: 12px;
            }

            .controls {
                gap: 8px;
                padding: 12px 10px;
                border-radius: 12px;
                flex-wrap: wrap;
            }

            .btn {
                padding: 10px 14px;
                font-size: 11px;
                border-radius: 8px;
                letter-spacing: 0.5px;
            }

            .speed-row {
                margin-left: 0;
                width: 100%;
                justify-content: center;
            }

            .log {
                font-size: 12px;
                padding: 12px 14px;
            }

            /* Sorting bars */
            .bar-viz {
                height: 140px;
                gap: 4px;
                padding: 10px 6px;
            }

            .bar {
                min-width: 28px;
                font-size: 10px;
            }

            /* Array cells */
            .arr-cell {
                width: 40px;
                height: 40px;
                font-size: 14px;
                border-radius: 8px;
            }

            /* DP cells */
            .dp-cell {

            /* Linked list nodes */

        }

        @media (max-width: 420px) {
            .header h1 {
                font-size: 22px;
            }

            .tab {
                font-size: 9px;
                padding: 12px 6px;
            }

            .topic-grid {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
                gap: 6px;
            }

            .topic-btn .icon {
                font-size: 20px;
                margin-bottom: 6px;
            }

            .topic-btn .name {
                font-size: 11px;
            }

            .demo-title {
                font-size: 16px;
            }

            .arr-cell {
                width: 34px;
                height: 34px;
                font-size: 12px;
            }

            .dp-cell {

                height: 30px;
                font-size: 11px;
            }

            .bar {

                font-size: 12px;

        }

        .telemetry-hud {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(79, 255, 229, 0.3);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted);
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .tel-row { display: flex; justify-content: space-between; gap: 15px; }
        .tel-val { color: var(--accent3); font-weight: 800; font-size: 12px; }
    </style>
</head>

<body>
    <div id="app">
        <div class="header" style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:20px;">
            <div>
                <h1>DSA <span>Explorer</span></h1>
                <p style="font-size: 13px; color: var(--muted); font-family: var(--font-mono); margin-top: 6px; opacity: 0.8;">Interactive visualizations for algorithms & data structures</p>
            </div>
            <div style="display:flex; gap:10px; align-items:center; background:rgba(0,0,0,0.3); padding:8px 12px; border-radius:12px; border:1px solid rgba(255,255,255,0.05);">
                <span style="font-size:16px;">🔥</span>
                <input type="text" id="lc-search" placeholder="Enter LeetCode URL..." style="width:220px; padding:6px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:#1b163d; color:#fff; font-family:var(--font-mono); font-size:12px; outline:none;" onkeydown="if(event.key==='Enter')parseLeetCode()">
                <button class="btn" style="padding:6px 12px; font-size:11px;" onclick="parseLeetCode()">Parse Logic</button>
            </div>
        </div>

        <div class="tabs" id="tabs">
            <div class="tab active" onclick="switchTab('sorting')">Sorting</div>
            <div class="tab" onclick="switchTab('searching')">Searching</div>
            <div class="tab" onclick="switchTab('ds')">Data Structures</div>
            <div class="tab" onclick="switchTab('trees')">Trees</div>
            <div class="tab" onclick="switchTab('graphs')">Graphs</div>
            <div class="tab" onclick="switchTab('dp')">Dynamic Prog.</div>
            <div class="tab" onclick="switchTab('patterns')">Patterns</div>
        </div>

        <div class="content" id="content"></div>
    </div>

    <script>
        class StateManager {
            constructor() { this.states = []; this.isRecording = false; this.playIdx = 0; this.timer = null; }
            record() {
                if (!this.isRecording) return;
                if (this.states.length > 2000) return; // Circuit breaker to prevent RAM exhaustion
                const vizs = Array.from(document.querySelectorAll('.viz-area')).map(el => el.innerHTML);
                const log = document.querySelector('.log');
                const pip = document.getElementById('pip-code');
                if (vizs.length > 0) this.states.push({ vizs, log: log ? log.innerHTML : '', pip: pip ? pip.innerHTML : '' });
            }
            applyFrame(idx) {
                if (idx < 0 || idx >= this.states.length) return;
                document.querySelectorAll('.viz-area').forEach((el, i) => { if(this.states[idx].vizs[i] !== undefined) el.innerHTML = this.states[idx].vizs[i]; });
                const log = document.querySelector('.log');
                const pip = document.getElementById('pip-code');
                if (log) log.innerHTML = this.states[idx].log;
                if (pip && this.states[idx].pip) pip.innerHTML = this.states[idx].pip;
                const s = document.getElementById('tt-scrub');
                if (s) s.value = idx;
                const tt = document.getElementById('tt-current');
                if (tt) tt.textContent = idx;
                this.playIdx = idx;
            }
            pause() { clearInterval(this.timer); this.timer = null; }
            play(speed) {
                this.pause();
                this.timer = setInterval(() => {
                    if (this.playIdx < this.states.length - 1) this.applyFrame(this.playIdx + 1);
                    else this.pause();
                }, speed);
            }
        }
        const Scrubber = new StateManager();

        /* ===== ISO 3D Interaction (User-Friendly Rotation) ===== */
        let isIsoDragging = false, isoX = 0, isoY = 0, currentRX = 60, currentRZ = -45;
        const isoStart = (e) => {
            const iso = e.target.closest('.iso-3d'); if (!iso) return;
            isIsoDragging = true; const ev = e.type.includes('touch') ? e.touches[0] : e;
            isoX = ev.clientX; isoY = ev.clientY; iso.style.transition = 'none';
        };
        const isoMove = (e) => {
            if (!isIsoDragging) return; const iso = document.querySelector('.iso-3d'); if (!iso) return;
            const ev = e.type.includes('touch') ? e.touches[0] : e;
            let dx = ev.clientX - isoX; let dy = ev.clientY - isoY;
            
            // intuitive mapping: drag horizontal -> yaw, drag vertical -> pitch
            currentRZ += dx * 0.6; currentRX += dy * 0.6;
            currentRX = Math.max(15, Math.min(85, currentRX)); 
            
            iso.style.setProperty('--rx', currentRX + 'deg');
            iso.style.setProperty('--rz', currentRZ + 'deg');
            isoX = ev.clientX; isoY = ev.clientY;
            if (e.cancelable) e.preventDefault();
        };
        function toggle3DMode() {
            const viz = document.getElementById('dp-viz'); if (!viz) return;
            const master = document.getElementById('3d-master'); if (!master) return;
            const resetBtn = document.getElementById('3d-reset-icon');
            const mainBtn = master.querySelector('button');
            const isActive = viz.classList.contains('iso-3d');

            if (!isActive) {
                viz.classList.add('iso-3d');
                mainBtn.innerHTML = '🧊 Disable 3D';
                resetBtn.style.display = 'block';
                currentRX = 60; currentRZ = -45; // Reset internal tracking
            } else {
                viz.classList.remove('iso-3d');
                mainBtn.innerHTML = '🧊 Activate 3D';
                resetBtn.style.display = 'none';
            }
            // Trigger re-render to apply/remove Z-translations
            if (dpAlgo === 'knapsack' || dpAlgo === 'lcs') setDP(dpAlgo);
        }
        function reset3DView() {
            currentRX = 60; currentRZ = -45;
            const iso = document.querySelector('.iso-3d');
            if (iso) {
                iso.style.transition = 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                iso.style.setProperty('--rx', '60deg'); iso.style.setProperty('--rz', '-45deg');
            }
        }
        const isoEnd = () => {
            isIsoDragging = false; const iso = document.querySelector('.iso-3d');
            if (iso) iso.style.transition = 'transform 0.4s ease-out';
        };
        document.addEventListener('mousedown', isoStart);
        window.addEventListener('mousemove', isoMove);
        window.addEventListener('mouseup', isoEnd);
        document.addEventListener('touchstart', isoStart, {passive:false});
        window.addEventListener('touchmove', isoMove, {passive:false});
        window.addEventListener('touchend', isoEnd);

        const DELAY = async (ms) => {
            if (Scrubber.isRecording) { Scrubber.record(); return; }
            await new Promise(r => setTimeout(r, ms));
        };

        async function execTT(fn) {
            if (animating) return;
            Scrubber.states = []; Scrubber.isRecording = true;
            Scrubber.record();
            await fn();
            Scrubber.isRecording = false;
            let controls = document.querySelector('.controls');
            if (controls && !document.getElementById('tt-scrub')) {
                let div = document.createElement('div');
                div.id = 'tt-row'; 
                div.style.cssText = "width:100%; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px; margin-top:14px; background:rgba(0,0,0,0.4); padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);";
                div.innerHTML = `
                <div style="display:flex; align-items:center; gap:6px;">
                    <span style="font-size:10px; font-weight:800; color:var(--muted); margin-right:4px;">TIMELINE:</span>
                    <button class="btn" style="padding:4px 8px; font-size:11px;" onclick="Scrubber.pause(); Scrubber.playIdx>0 && Scrubber.applyFrame(Scrubber.playIdx-1)">⏮</button>
                    <button class="btn primary" style="padding:4px 8px; font-size:11px;" onclick="if(Scrubber.timer) Scrubber.pause(); else Scrubber.play(speedMs);">⏯</button>
                    <button class="btn" style="padding:4px 8px; font-size:11px;" onclick="Scrubber.pause(); Scrubber.playIdx<Scrubber.states.length-1 && Scrubber.applyFrame(Scrubber.playIdx+1)">⏭</button>
                </div>
                <div style="flex:1; min-width:180px; display:flex; align-items:center; gap:10px;">
                    <input type="range" id="tt-scrub" min="0" max="${Math.max(0, Scrubber.states.length-1)}" value="0" style="flex:1; accent-color:var(--accent3);" oninput="Scrubber.applyFrame(+this.value); Scrubber.pause();">
                    <span style="font-size:11px; font-family:var(--font-mono); color:var(--muted); white-space:nowrap;"><span id="tt-current">0</span> / <span id="tt-max">${Math.max(0, Scrubber.states.length-1)}</span></span>
                </div>
                <button class="btn" id="export-btn" style="padding:4px 8px; font-size:11px; background:#4a3a99; border-color:#5444b0; color:#fff;" onclick="exportTraceVideo();">⏺ Export</button>`;
                controls.appendChild(div);
            } else if (document.getElementById('tt-scrub')) {
                document.getElementById('tt-scrub').max = Math.max(0, Scrubber.states.length - 1);
                document.getElementById('tt-max').textContent = Math.max(0, Scrubber.states.length - 1);
            }
            Scrubber.applyFrame(0);
            Scrubber.play(speedMs);
        }
        let animating = false;
        let speedMs = 400;

        let Metrics = { compares: 0, writes: 0, swaps: 0 };
        function updateTelemetry() {
            const vizArea = document.querySelector('.viz-area');
            if (!vizArea) return;
            const existing = document.getElementById('tel-hud');
            if (existing) existing.remove();
            const hud = document.createElement('div');
            hud.id = 'tel-hud';
            hud.className = 'telemetry-hud';
            hud.innerHTML = `
                <div class="tel-row"><span>Comparisons:</span> <span class="tel-val">${Metrics.compares}</span></div>
                <div class="tel-row"><span>Array Writes:</span> <span class="tel-val">${Metrics.writes}</span></div>
                <div class="tel-row"><span>Memory Swaps:</span> <span class="tel-val">${Metrics.swaps}</span></div>
            `;
            vizArea.appendChild(hud);
        }
        function resetMetrics() {
            Metrics = { compares: 0, writes: 0, swaps: 0 };
            updateTelemetry();
        }

        function parseLeetCode() {
            const val = document.getElementById('lc-search').value.toLowerCase().trim();
            if(!val) return;
            const btn = document.querySelector('.header button');
            if (btn) { btn.innerHTML = '⚡ Scanning...'; btn.style.pointerEvents = 'none'; }
            
            let slug = val;
            try {
                if (val.startsWith('http')) {
                    const parts = val.split('/problems/')[1];
                    if (parts) slug = parts.split('/')[0];
                }
            } catch(e) {}
            
            setTimeout(() => {
                if (btn) { btn.innerHTML = 'Parse Logic'; btn.style.pointerEvents = 'auto'; }
                
                let foundType = "Optimization Engine";
                if (slug.includes('sum') || slug.includes('water') || slug.includes('two-sum') || slug.includes('pair')) {
                    switchTab('patterns'); setTimeout(() => setPattern('twopointers'), 10);
                    foundType = 'Two Pointers Heuristic';
                } else if (slug.includes('island') || slug.includes('path') || slug.includes('graph') || slug.includes('network') || slug.includes('connection')) {
                    switchTab('graphs'); setTimeout(() => setGraph(slug.includes('path') ? 'dijkstra' : 'dfs'), 10);
                    foundType = 'Graph Topology Analysis';
                } else if (slug.includes('stairs') || slug.includes('dp') || slug.includes('matrix') || slug.includes('knapsack') || slug.includes('subsequence')) {
                    switchTab('dp'); setTimeout(() => setDP(slug.includes('subsequence') ? 'lcs' : 'stairs'), 10);
                    foundType = 'Dynamic Programming Logic';
                } else if (slug.includes('coin') || slug.includes('greedy') || slug.includes('change')) {
                    switchTab('patterns'); setTimeout(() => setPattern('greedy'), 10);
                    foundType = 'Greedy Optimization Mapping';
                } else if (slug.includes('window') || slug.includes('substring') || slug.includes('subarray')) {
                    switchTab('patterns'); setTimeout(() => setPattern('sliding'), 10);
                    foundType = 'Sliding Window Framework';
                } else if (slug.includes('cycle') || slug.includes('fast-and-slow') || slug.includes('tortoise')) {
                    switchTab('patterns'); setTimeout(() => setPattern('fastslow'), 10);
                    foundType = 'Fast & Slow Cycle Isolation';
                } else if (slug.includes('tree') || slug.includes('bst') || slug.includes('node') || slug.includes('root') || slug.includes('depth')) {
                    switchTab('trees'); setTimeout(() => setTree(slug.includes('bfs') ? 'bfs' : 'bst'), 10);
                    foundType = 'Hierarchical Tree Mapping';
                } else if (slug.includes('sort')) {
                    switchTab('sorting'); setTimeout(() => setSortAlgo('quick'), 10);
                    foundType = 'Sequential Sorting Matrix';
                } else if (slug.includes('search')) {
                    switchTab('searching'); setTimeout(() => setSearch('binary'), 10);
                    foundType = 'Targeted Search Heuristic';
                } else {
                    switchTab('sorting');
                    foundType = 'Standard Algorithmic Sequence';
                }

                updateLogText(`LeetCode Intercept: "${slug}" identified. Mapped to ${foundType}.`);
                const toast = document.createElement('div');
                toast.style.cssText = "position:fixed; bottom:20px; right:20px; background:var(--accent); color:#000; padding:12px 24px; border-radius:12px; font-family:var(--font-mono); font-weight:800; font-size:13px; box-shadow:0 10px 40px rgba(0,0,0,0.5); z-index:10000; animation:slide-in 0.3s ease-out;";
                toast.innerHTML = `<span style="opacity:0.6;font-size:10px;display:block">API AUTO-INJECTOR</span>✓ ${foundType} LOADED`;
                document.body.appendChild(toast);
                setTimeout(() => { toast.style.opacity = "0"; setTimeout(() => toast.remove(), 300); }, 3000);
            }, 1000);
        }

        async function exportTraceVideo() {
            const btn = document.getElementById('export-btn');
            if (!Scrubber.states.length) { alert("Nothing to export. Run an algorithm first!"); return; }
            if (btn) { btn.innerHTML = '🎬 Loading...'; btn.style.pointerEvents = 'none'; }
            
            if (!window.html2canvas) {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                document.head.appendChild(script);
                await new Promise(r => script.onload = r);
            }

            const area = document.querySelector('.demo-area');
            if (!area) return;

            Scrubber.pause();
            const originalIdx = Scrubber.playIdx;
            
            // Create recording canvas
            const canvas = document.createElement('canvas');
            const rect = area.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            const ctx = canvas.getContext('2d');
            
            const stream = canvas.captureStream(0); // Manual frame capture
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `dsa_trace_${Date.now()}.webm`;
                a.click();
                if (btn) { btn.innerHTML = '⏺ Export .webm'; btn.style.pointerEvents = 'auto'; }
                Scrubber.applyFrame(originalIdx);
            };

            recorder.start();
            
            for (let i = 0; i < Scrubber.states.length; i++) {
                if (btn) btn.innerHTML = `🎥 ${Math.round((i/Scrubber.states.length)*100)}%`;
                Scrubber.applyFrame(i);
                // Force a small delay for DOM to settle
                await new Promise(r => setTimeout(r, 50));
                const frame = await html2canvas(area, {
                    backgroundColor: '#11111d',
                    logging: false,
                    scale: 1,
                    useCORS: true
                });
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
                stream.getVideoTracks()[0].requestFrame();
                await new Promise(r => setTimeout(r, 100)); // Give time for frame to be captured
            }
            
            recorder.stop();
        }

        function drawSortBars(arr, highlights = [], compares = [], sorted = []) {

        function setSteps(n) { sortSteps = n; const b = document.getElementById('step-badge'); if (b) b.textContent = 'STEPS: ' + n; }

        async function runSort() {
            if (animating) return;
            animating = true;
            sortSteps = 0;
            resetMetrics();
            let arr = [...sortArr];
            const sorted = [];

            if (sortAlgo === 'bubble') {
                for (let i = 0; i < arr.length && animating; i++) {
                    updatePIP('bubble', 0);
                    for (let j = 0; j < arr.length - i - 1 && animating; j++) {
                        updatePIP('bubble', 1);
                        updateLogText(`Comparing elements at index ${j} and ${j + 1}`);
                        drawSortBars(arr, [j], [j + 1], Array.from({ length: i }, (_, k) => arr.length - 1 - k));
                        
                        Metrics.compares++; updateTelemetry();
                        updatePIP('bubble', 2);
                        await DELAY(speedMs); setSteps(++sortSteps);
                        if (arr[j] > arr[j + 1]) { 
                            [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]]; 
                            Metrics.swaps++; Metrics.writes += 2; updateTelemetry();
                            updatePIP('bubble', 3);
                            updateLogText(`Swapped! Array state: [${arr}]`); 
                            drawSortBars(arr, [j + 1], [j], Array.from({ length: i }, (_, k) => arr.length - 1 - k)); 
                            await DELAY(speedMs / 2); 
                        }
                    }
                    sorted.push(arr.length - 1 - i);
                }
            } else if (sortAlgo === 'selection') {
                for (let i = 0; i < arr.length && animating; i++) {
                    updatePIP('selection', 0);
                    let min = i;
                    updatePIP('selection', 1);
                    for (let j = i + 1; j < arr.length && animating; j++) {
                        updatePIP('selection', 2);
                        updateLogText(`Scanning for minimum: comparing arr[${j}]=${arr[j]} with current min=${arr[min]}`);
                        drawSortBars(arr, [min], [j], [...sorted]);
                        
                        Metrics.compares++; updateTelemetry();
                        updatePIP('selection', 3);
                        await DELAY(speedMs); setSteps(++sortSteps);
                        if (arr[j] < arr[min]) { min = j; updatePIP('selection', 4); }
                    }
                    [arr[i], arr[min]] = [arr[min], arr[i]];
                    Metrics.swaps++; Metrics.writes += 2; updateTelemetry();
                    updatePIP('selection', 5);
                    sorted.push(i);
                    updateLogText(`Placed ${arr[i]} at its final position ${i}`);
                    drawSortBars(arr, [], [], [...sorted]); await DELAY(speedMs);
                }
            } else if (sortAlgo === 'insertion') {
                for (let i = 1; i < arr.length && animating; i++) {
                    updatePIP('insertion', 0);
                    let key = arr[i], j = i - 1;
                    updatePIP('insertion', 1); updatePIP('insertion', 2);
                    while (j >= 0 && animating) {
                        updatePIP('insertion', 3);
                        Metrics.compares++; updateTelemetry();
                        if (arr[j] <= key) break;
                        updateLogText(`Shifting ${arr[j]} to the right to make room for ${key}`);
                        arr[j + 1] = arr[j]; j--;
                        Metrics.writes++; updateTelemetry();
                        updatePIP('insertion', 4); updatePIP('insertion', 5);
                        drawSortBars(arr, [j + 1], [i], []); await DELAY(speedMs); setSteps(++sortSteps);
                    }
                    arr[j + 1] = key;
                    Metrics.writes++; updateTelemetry();
                    updatePIP('insertion', 6);
                    updateLogText(`Inserted ${key} at position ${j + 1}`);
                    drawSortBars(arr, [j + 1], [], []); await DELAY(speedMs / 2);
                }
                drawSortBars(arr, [], [], arr.map((_, i) => i));
            } else if (sortAlgo === 'merge') {
                async function merge(a, l, m, r) {
                    let left = a.slice(l, m + 1), right = a.slice(m + 1, r + 1), i = 0, j = 0, k = l;
                    while (i < left.length && j < right.length && animating) {
                        updateLogText(`Merging halves: comparing ${left[i]} and ${right[j]}`);
                        drawSortBars(a, [k], [], []); 
                        Metrics.compares++; updateTelemetry(); 
                        await DELAY(speedMs); setSteps(++sortSteps);
                        if (left[i] <= right[j]) a[k++] = left[i++]; else a[k++] = right[j++];
                        Metrics.writes++; updateTelemetry();
                    }
                    while (i < left.length) { a[k++] = left[i++]; Metrics.writes++; updateTelemetry(); }
                    while (j < right.length) { a[k++] = right[j++]; Metrics.writes++; updateTelemetry(); }
                    updatePIP('merge', 5);
                }
                async function mergeSort(a, l, r) {
                    updatePIP('merge', 0);
                    if (l >= r || !animating) return;
                    updatePIP('merge', 1);
                    let m = Math.floor((l + r) / 2);
                    updatePIP('merge', 2);
                    await mergeSort(a, l, m); 
                    updatePIP('merge', 3);
                    await mergeSort(a, m + 1, r);
                    updatePIP('merge', 4);
                    await merge(a, l, m, r);
                    drawSortBars(a, [], [], []); await DELAY(speedMs / 2);
                }
                await mergeSort(arr, 0, arr.length - 1);
                drawSortBars(arr, [], [], arr.map((_, i) => i));
            } else if (sortAlgo === 'quick') {
                const viz = document.getElementById('sort-viz');
                async function partition(a, lo, hi) {
                    let pivot = a[hi], i = lo - 1;
                    for (let j = lo; j < hi && animating; j++) {
                        updateLogText(`Pivot=${pivot}. Evaluating arr[${j}]=${a[j]}`);
                        const piv = [hi], comp = [j], high = [i >= lo ? i : -1].filter(x => x >= 0);
                        const barWrap = viz.querySelector('.bar-viz');
                        if (barWrap) { barWrap.querySelectorAll('.bar').forEach((b, idx) => { b.className = 'bar' + (piv.includes(idx) ? ' pivot' : '') + (comp.includes(idx) ? ' compare' : '') + (high.includes(idx) ? ' highlight' : ''); }); }
                        
                        Metrics.compares++; updateTelemetry();
                        await DELAY(speedMs); setSteps(++sortSteps);
                        if (a[j] < pivot) { 
                            i++; [a[i], a[j]] = [a[j], a[i]]; 
                            Metrics.swaps++; Metrics.writes+=2; updateTelemetry();
                            updateLogText(`Swapping arr[${i}] and arr[${j}]`); 
                        }
                    }
                    [a[i + 1], a[hi]] = [a[hi], a[i + 1]];
                    Metrics.swaps++; Metrics.writes+=2; updateTelemetry();
                    return i + 1;
                }
                async function quickSort(a, lo, hi) {
                    updatePIP('quick', 0);
                    if (lo >= hi || !animating) return;
                    updatePIP('quick', 1);
                    drawSortBars(a, [], [hi], []);
                    updatePIP('quick', 2);
                    let p = await partition(a, lo, hi);
                    drawSortBars(a, [p], [], [p]); await DELAY(speedMs / 2);
                    updatePIP('quick', 3);
                    await quickSort(a, lo, p - 1); 
                    updatePIP('quick', 4);
                    await quickSort(a, p + 1, hi);
                }
                await quickSort(arr, 0, arr.length - 1);
                drawSortBars(arr, [], [], arr.map((_, i) => i));
            } else if (sortAlgo === 'heap') {
                async function heapify(a, n, i) {
                    updatePIP('heap', 0); updatePIP('heap', 1);
                    let largest = i, l = 2 * i + 1, r = 2 * i + 2;
                    Metrics.compares++; 
                    if (l < n && a[l] > a[largest]) largest = l;
                    Metrics.compares++; updateTelemetry();
                    updatePIP('heap', 2);
                    if (r < n && a[r] > a[largest]) largest = r;
                    updatePIP('heap', 3);
                    if (largest !== i) { 
                        updateLogText(`Heapify: swapping ${a[i]} ↔ ${a[largest]}`); 
                        [a[i], a[largest]] = [a[largest], a[i]]; 
                        Metrics.swaps++; Metrics.writes+=2; updateTelemetry();
                        updatePIP('heap', 4);
                        drawSortBars(a, [i, largest], [], sorted.map(x => x)); 
                        await DELAY(speedMs); setSteps(++sortSteps); 
                        updatePIP('heap', 5);
                        await heapify(a, n, largest); 
                    }
                }
                for (let i = Math.floor(arr.length / 2) - 1; i >= 0 && animating; i--) await heapify(arr, arr.length, i);
                for (let i = arr.length - 1; i > 0 && animating; i--) {
                    [arr[0], arr[i]] = [arr[i], arr[0]]; sorted.push(i);
                    Metrics.swaps++; Metrics.writes+=2; updateTelemetry();
                    updateLogText(`Extracted max=${arr[i]}, placed at index ${i}`);
                    drawSortBars(arr, [0], [], [...sorted]); await DELAY(speedMs); setSteps(++sortSteps);
                    await heapify(arr, i, 0);
                }
                drawSortBars(arr, [], [], arr.map((_, i) => i));
            } else if (sortAlgo === 'counting') {
                const max = Math.max(...arr);
                updatePIP('counting', 0);
                const count = Array(max + 1).fill(0);
                updatePIP('counting', 1);
                for (let i = 0; i < arr.length && animating; i++) {
                    count[arr[i]]++;
                    updatePIP('counting', 2);
                    updateLogText(`Counting: value ${arr[i]} → count[${arr[i]}] = ${count[arr[i]]}`);
                    drawSortBars(arr, [i], [], []); await DELAY(speedMs); setSteps(++sortSteps);
                }
                let idx = 0;
                updatePIP('counting', 3);
                updatePIP('counting', 4);
                for (let v = 0; v <= max && animating; v++) {
                    for (let c = 0; c < count[v] && animating; c++) {
                        updatePIP('counting', 5);
                        arr[idx] = v;
                        Metrics.writes++; updateTelemetry();
                        updatePIP('counting', 6);
                        updateLogText(`Placing value ${v} at index ${idx}`);
                        drawSortBars(arr, [idx], [], Array.from({ length: idx }, (_, i) => i));
                        await DELAY(speedMs); setSteps(++sortSteps); idx++;
                    }
                }
                drawSortBars(arr, [], [], arr.map((_, i) => i));
            }

            if (animating) { updateLogText('Process Complete. Array sorted successfully in ' + sortSteps + ' steps.'); animating = false; }
        }

            } else {
                updatePIP('binary', 0);

                    await DELAY(speedMs / 2);

        let heapArr = [2, 5, 8, 10, 14];
        function drawHeapTree(arr, highlights) {

            function getPos(idx) {
                const depth = Math.floor(Math.log2(idx + 1));

                const posInLevel = idx - (Math.pow(2, depth) - 1);

        function trieSearchWord(root, word) { let node = root; const path = []; for (const ch of word) { path.push(ch); if (!node.children[ch]) return { found: false, path }; node = node.children[ch]; } return { found: node.isEnd, path }; }
        function drawTrieViz(root, highlightPath) {
            const viz = document.getElementById('ds-viz'); if (!viz) return;

            const W = 400, H = 220;
            let svg = `<svg class="tree-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:400px;">
             <defs><filter id="tglow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter></defs>`;
            function drawTrieNode(node, x, y, spread, depth, pathSoFar) {
                const keys = Object.keys(node.children).sort();
                const startX = x - (keys.length - 1) * spread / 2;
                keys.forEach((ch, i) => {
                    const cx = startX + i * spread;

                    const stroke = isHL ? '#4fffe5' : node.children[ch].isEnd ? '#ff75a0' : 'rgba(124, 106, 255, 0.5)';
