            graphAlgo = a;
            const grid = document.querySelector('.topic-grid');
            if (grid) grid.classList.remove('expanded');
            ['bfs', 'dfs', 'dijkstra', 'topo', 'kruskal'].forEach(m => { const b = document.getElementById('gbtn-' + m); if (b) b.classList.toggle('active', m === a); });
            const configs = {
                bfs: { title: 'Graph Traversal (BFS)', desc: 'Pings adjacent nodes radially outwards from a designated start point.' },
                dfs: { title: 'Graph Traversal (DFS)', desc: 'Probes as deep as possible into each branch before backtracking.' },
                dijkstra: { title: "Dijkstra's Pathfinding", desc: "Calculates the absolute shortest path between nodes using physical edge weights." },
                topo: { title: 'Topological Sort', desc: 'Generates a linear ordering based on directional dependencies (e.g. course prerequisites).' },
                kruskal: { title: "Kruskal's MST", desc: 'Finds the Minimum Spanning Tree by linking the cheapest edges without forming cycles.' }
            };
            const c = configs[a];
            document.getElementById('graph-title').textContent = c.title;
            document.getElementById('graph-desc').textContent = c.desc;
            updateLogText('Algorithm deployed in memory. Awaiting trace command.');
            drawGraph([], []);
            updateConceptUI('graph-' + a);
        }

        function drawGraph(visited, current, path = []) {
            const canvas = document.getElementById('graph-canvas'); if (!canvas) return;
            const W = 260, H = 240;
            let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;overflow:visible">
             <defs>
               <filter id="gglow" x="-20%" y="-20%" width="140%" height="140%">
                 <feGaussianBlur stdDeviation="4" result="blur" />
                 <feComposite in="SourceGraphic" in2="blur" operator="over" />
               </filter>
             </defs>`;
            GEDGES.forEach(([a, b, w]) => {
                const inPath = path.some(([x, y]) => (x === a && y === b) || (x === b && y === a));
                svg += `<line x1="${GPOS[a][0]}" y1="${GPOS[a][1]}" x2="${GPOS[b][0]}" y2="${GPOS[b][1]}" stroke="${inPath ? 'var(--accent)' : 'rgba(255,255,255,0.1)'}" stroke-width="${inPath ? 3 : 2}" ${inPath ? 'filter="url(#gglow)"' : ''}/>`;
                const weight = w || Math.max(1, Math.round(Math.hypot(GPOS[a][0]-GPOS[b][0], GPOS[a][1]-GPOS[b][1]) / 10));
                const mx = (GPOS[a][0] + GPOS[b][0]) / 2;
                const my = (GPOS[a][1] + GPOS[b][1]) / 2;
                if (graphAlgo === 'dijkstra') svg += `<rect x="${mx-8}" y="${my-8}" width="16" height="16" fill="#1e1e2d" rx="4"/><text x="${mx}" y="${my}" text-anchor="middle" dominant-baseline="central" fill="var(--accent3)" font-size="10" font-family="var(--font-mono)" font-weight="700">${weight}</text>`;
            });
            GNODES.forEach(n => {
                const [x, y] = GPOS[n];
                const isVis = visited.includes(n), isCur = current.includes(n);
                const fill = isCur ? 'rgba(255, 117, 160, 0.2)' : isVis ? 'rgba(79, 255, 229, 0.15)' : '#1e1e2d';
                const stroke = isCur ? '#ff75a0' : isVis ? '#4fffe5' : 'rgba(124, 106, 255, 0.6)';
                svg += `<circle cx="${x}" cy="${y}" r="22" fill="${fill}" stroke="${stroke}" stroke-width="2.5" ${isCur || isVis ? 'filter="url(#gglow)"' : ''}/>`;
                svg += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" fill="${isCur || isVis ? '#fff' : '#e8e8f0'}" font-size="14" font-family="JetBrains Mono,monospace" font-weight="600">${n}</text>`;
            });
            svg += '</svg>';
            canvas.innerHTML = svg;
        }

        async function runGraph() {
            if (animating) return;
            animating = true;
            resetMetrics();
            const visited = [], path = [];
            const target = document.getElementById('graph-target') ? document.getElementById('graph-target').value.toUpperCase().trim() : null;
            
            const ADJ = {};
            GNODES.forEach(n => ADJ[n] = []);
            GEDGES.forEach(([u, v, w]) => {
                const weight = w || Math.max(1, Math.round(Math.hypot(GPOS[u][0]-GPOS[v][0], GPOS[u][1]-GPOS[v][1]) / 10));
                ADJ[u].push({node: v, w: weight});
                if (graphAlgo !== 'topo') ADJ[v].push({node: u, w: weight});
            });
            const rootNode = GNODES.includes('A') ? 'A' : GNODES[0];

            if (graphAlgo === 'bfs') {
                updatePIP('bfs', 0);
                const queue = [rootNode], seen = new Set([rootNode]);
                updatePIP('bfs', 1);
                while (queue.length && animating) {
                    updatePIP('bfs', 2);
                    const cur = queue.shift(); visited.push(cur);
                    updatePIP('bfs', 3);
                    drawGraph(visited, [cur], path); updateLogText(`Processing Node [${cur}]. Queue Load: {${queue.join(',')}} | Visited State: {${visited.join(',')}}`);
                    Metrics.writes++; updateTelemetry();
                    await DELAY(speedMs);
                    if (target && cur === target) {
                        updateLogText(`✓ Target Node [${target}] reached! BFS search terminated successfully.`);
                        animating = false; return;
                    }
                    updatePIP('bfs', 4);
                    for (const edge of ADJ[cur]) { 
                        const nb = edge.node; 
                        Metrics.compares++; updateTelemetry();
                        updatePIP('bfs', 5);
                        if (!seen.has(nb)) { 
                            updatePIP('bfs', 6);
                            seen.add(nb); queue.push(nb); path.push([cur, nb]); 
                            Metrics.writes+=2; updateTelemetry();
                            updatePIP('bfs', 7);
                        } 
                    }
                }
                updateLogText(`BFS trace successful. Layer mapping completed: ${visited.join(' → ')}`);
            } else if (graphAlgo === 'dfs') {
                updatePIP('dfs', 0);
                const seen = new Set();
                let found = false;
                async function dfs(n) { 
                    if (!n || seen.has(n) || !animating || found) { updatePIP('dfs', 1); return; }
                    updatePIP('dfs', 2);
                    seen.add(n); visited.push(n); 
                    Metrics.writes++; updateTelemetry();
                    drawGraph(visited, [n], path); 
                    updateLogText(`Deep Dive processing Node [${n}]. Active Chain: {${visited.join(' → ')}}`); 
                    await DELAY(speedMs); 
                    if (target && n === target) {
                        found = true;
                        updateLogText(`✓ Target Node [${target}] discovered in DFS recursion! Stopping trace.`);
                        return;
                    }
                    updatePIP('dfs', 3);
                    for (const edge of ADJ[n]) { 
                        const nb = edge.node; 
                        Metrics.compares++; updateTelemetry();
                        if (!seen.has(nb)) { path.push([n, nb]); updatePIP('dfs', 4); await dfs(nb); } 
                    } 
                }
                updatePIP('dfs', 5);
                await dfs(rootNode); 
                if (!found) updateLogText(`DFS trace successful. Deepest routing paths explored: ${visited.join(' → ')}`);
            } else if (graphAlgo === 'dijkstra') {
                updatePIP('dijkstra', 0);
                const dist = {}; GNODES.forEach(n => dist[n] = Infinity); dist[rootNode] = 0;
                const unvis = new Set(GNODES);
                updatePIP('dijkstra', 1);
                while (unvis.size && animating) {
                    updatePIP('dijkstra', 2);
                    let u = [...unvis].reduce((a, b) => dist[a] < dist[b] ? a : b);
                    updatePIP('dijkstra', 3);
                    unvis.delete(u); visited.push(u);
                    Metrics.writes++; updateTelemetry();
                    drawGraph(visited, [u], path); updateLogText(`Node [${u}] selected: calculated distance=${dist[u]}. Grid Vector: ${GNODES.map(n => `${n}:${dist[n] === Infinity ? '∞' : dist[n]}`).join(', ')}`);
                    await DELAY(speedMs);
                    updatePIP('dijkstra', 4);
                    for (const edge of ADJ[u]) { 
                        const nb = edge.node, w = edge.w;
                        Metrics.compares++; updateTelemetry();
                        updatePIP('dijkstra', 5);
                        if (dist[u] + w < dist[nb]) { 
                            dist[nb] = dist[u] + w; path.push([u, nb]); 
                            Metrics.writes++; updateTelemetry();
                            updatePIP('dijkstra', 6);
                        } 
                    }
                }
                updateLogText(`Optimal routing resolved. Vectors from root (${rootNode}): ${GNODES.map(n => `[${n}]=${dist[n]}`).join(' | ')}`);
            } else if (graphAlgo === 'topo') {
                const order = [], seen = new Set();
                async function dfs2(n) { if (seen.has(n) || !animating) return; seen.add(n); visited.push(n); drawGraph(visited, [n], path); updateLogText(`Evaluating dependencies for [${n}].`); await DELAY(speedMs); for (const edge of ADJ[n]) { const nb = edge.node; if (!seen.has(nb)) { path.push([n, nb]); await dfs2(nb); } } order.unshift(n); }
                for (const n of GNODES) await dfs2(n);
                updateLogText(`Dependency mapping complete. Valid Topological sequence: ${order.join(' → ')}`);
            } else if (graphAlgo === 'kruskal') {
                const edges = GEDGES.map(([a, b]) => {
                    const [x1, y1] = GPOS[a]; const [x2, y2] = GPOS[b];
                    const w = Math.round(Math.sqrt((x1-x2)**2 + (y1-y2)**2));
                    return { a, b, w };
                }).sort((x, y) => x.w - y.w);
                const parent = {}; GNODES.forEach(n => parent[n] = n);
                function find(x) { while (parent[x] !== x) x = parent[x]; return x; }
                function union(a, b) { parent[find(a)] = find(b); }
                let mstWeight = 0;
                updateLogText(`Edges sorted by weight: ${edges.map(e => `${e.a}-${e.b}(${e.w})`).join(', ')}`);
                await DELAY(speedMs);
                for (const e of edges) {
                    if (!animating) break;
                    if (find(e.a) !== find(e.b)) {
                        union(e.a, e.b);
                        path.push([e.a, e.b]);
                        visited.push(e.a); visited.push(e.b);
                        mstWeight += e.w;
                        drawGraph([...new Set(visited)], [e.a, e.b], path);
                        updateLogText(`Added edge ${e.a}-${e.b} (weight ${e.w}) to MST. Total weight: ${mstWeight}`);
                    } else {
                        drawGraph([...new Set(visited)], [e.a, e.b], path);
                        updateLogText(`Skipped edge ${e.a}-${e.b} (weight ${e.w}) — would create a cycle.`);
                    }
                    await DELAY(speedMs);
                }
                drawGraph(GNODES, [], path);
                updateLogText(`Kruskal's MST complete. Total weight = ${mstWeight}. Edges: ${path.map(([a, b]) => a + '-' + b).join(', ')}`);
            }
            animating = false;
        }
        function resetGraph() { animating = false; drawGraph([], []); updateLogText('Topology cache cleared. Awaiting next command.'); }

        let dpAlgo = 'fib';
        function renderDP() {
            document.getElementById('content').innerHTML = `
    <div class="topic-grid">
      <div class="topic-btn active" id="dpbtn-fib" onclick="setDP('fib')"><div class="icon">🐇</div><div class="name">Fibonacci Math</div><div class="complexity">Time: O(n)</div></div>
      <div class="topic-btn" id="dpbtn-lis" onclick="setDP('lis')"><div class="icon">📈</div><div class="name">Longest Incr. Seq.</div><div class="complexity">Time: O(n²)</div></div>
      <div class="topic-btn" id="dpbtn-knapsack" onclick="setDP('knapsack')"><div class="icon">🎒</div><div class="name">0/1 Knapsack Grid</div><div class="complexity">Time: O(nW)</div></div>
      <div class="topic-btn" id="dpbtn-lcs" onclick="setDP('lcs')"><div class="icon">🧩</div><div class="name">LCS</div><div class="complexity">Time: O(m×n)</div></div>
      <div class="topic-btn" id="dpbtn-stairs" onclick="setDP('stairs')"><div class="icon">🪜</div><div class="name">Climb Stairs</div><div class="complexity">Time: O(n)</div></div>
    </div>
    <div class="demo-area">
      <div class="demo-title" id="dp-title">Fibonacci sequence (Memoization)</div>
      <div class="demo-desc" id="dp-desc">Caches calculated subproblem results in a 1D array to eliminate redundant recursive branches.</div>
      <div class="viz-area" id="dp-viz" style="flex-direction:column;align-items:center;gap:12px;"></div>
      <div class="controls" style="flex-wrap:wrap;gap:15px;">
        <button class="btn primary" onclick="execTT(runDP)">▶ Compile Trace</button>
        <button class="btn" onclick="renderDP()">↺ Reset Memory</button>
        <div id="3d-master" style="display:flex; align-items:stretch; border:1px solid var(--accent); border-radius:10px; overflow:hidden; background:rgba(0,0,0,0.3); transition:all 0.3s; height:34px;">
            <button class="btn" style="border:none; border-radius:0; padding:4px 14px; background:transparent; font-size:12px; color:var(--accent3); font-weight:700; cursor:pointer;" onclick="toggle3DMode()">🧊 Activate 3D</button>
            <button class="btn" id="3d-reset-icon" style="border:none; border-radius:0; padding:4px 10px; background:rgba(255,255,255,0.05); border-left:1px solid var(--accent); display:none; cursor:pointer; color:var(--accent);" onclick="reset3DView()" title="Reset 3D Perspective">📐</button>
        </div>
        <div class="speed-row">Speed: <input type="range" class="speed" min="50" max="800" value="400" oninput="speedMs=800-this.value+50; if(Scrubber.timer) Scrubber.play(speedMs);"></div>
      </div>
      <div class="log" id="dp-log">DP engine ready. Dynamic memory states initialized to NULL.</div>
    </div>`;
            drawFibTable(Array(10).fill(null), -1);
            updateConceptUI('dp-' + dpAlgo);
        }

        function setDP(m) {
            dpAlgo = m;
            const grid = document.querySelector('.topic-grid');
            if (grid) grid.classList.remove('expanded');
            ['fib', 'lis', 'knapsack', 'lcs', 'stairs'].forEach(k => { const b = document.getElementById('dpbtn-' + k); if (b) b.classList.toggle('active', m === k); });
            const configs = {
                fib: { title: 'DP: Fibonacci Sequence (Memoization)', desc: 'Demonstrates overlapping subproblems saved in a contiguous buffer.' },
                lis: { title: 'Longest Increasing Subsequence', desc: 'Builds a 1D DP table where each entry represents the best choice based on previous lookups.' },
                knapsack: { title: '0/1 Knapsack (2D DP)', desc: 'Optimizes value selection across weight and item categories using subproblem comparison.' },
                lcs: { title: 'Longest Common Subsequence', desc: 'Compares two strings to find their maximum alignment using a string-indexed matrix.' },
                stairs: { title: 'Climbing Stairs', desc: 'Calculating distinct ways to reach a target step using sub-optimal paths (N-1 + N-2).' }
            };
            const c = configs[m];
            document.getElementById('dp-title').textContent = c.title;
            document.getElementById('dp-desc').textContent = c.desc;
            updateLogText('Dynamic Programming environment reset. Waiting for grid allocation.');
            
            if (m === 'fib') drawStairsTable(Array(11).fill(null), -1);
            else if (m === 'lis') drawLISTable([10, 22, 9, 33, 21], [1, 1, 1, 1, 1], -1);
            else if (m === 'knapsack') drawKnapsackGrid(Array(5).fill(0).map(() => Array(7).fill(0)), -1, -1);
            else if (m === 'lcs') drawLCSGrid("ABCDE", "ACE", Array(6).fill(0).map(() => Array(4).fill(0)), -1, -1);
            else if (m === 'stairs') drawStairsTable(Array(11).fill(null), -1);

            updateConceptUI('dp-' + m);
        }

            dp.forEach((v, i) => {

                cell.style.flexDirection = 'column'; cell.style.height = '54px'; cell.style.width = '54px';
                cell.innerHTML = `<span style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:2px;">F(${i})</span><span style="color:${v !== null ? '#fff' : 'inherit'}">${v ?? '-'}</span>`;
                row.appendChild(cell);
            });
            viz.appendChild(row);
        }

        function drawLISTable(arr, dp, cur) {

        function drawKnapsackGrid(grid, curI, curW) {
            const viz = document.getElementById('dp-viz'); if (!viz) return;
            viz.innerHTML = '<div class="section-label" style="text-align:center;">Entities: 3 | W: [2, 3, 4] | V: [3, 4, 5] | Max Cap: 6</div>';
            const table = document.createElement('div'); table.className = 'dp-table'; table.style.gridTemplateColumns = 'repeat(8,40px)';
            const hdr = ['(i\\w)', '0', '1', '2', '3', '4', '5', '6'];
            hdr.forEach(h => { const c = document.createElement('div'); c.className = 'dp-cell header'; c.textContent = h; table.appendChild(c); });
            grid.forEach((row, i) => { 
                const lbl = document.createElement('div'); lbl.className = 'dp-cell header'; lbl.textContent = 'i=' + i; table.appendChild(lbl); 
                row.forEach((v, w) => { 
                    const c = document.createElement('div'); 
                    c.id = `dp-cell-${i}-${w}`;
                    c.className = 'dp-cell' + (i === curI && w === curW ? ' current' : v > 0 ? ' filled' : ''); 
                    c.textContent = v || '-'; 
                    // Data flow highlighting
                    if (i > 0) {
                        const W = [0, 2, 3, 4]; // Current hardcoded Knapsack weights
                        let sources = [`${i-1},${w}`];
                        if (w >= W[i]) sources.push(`${i-1},${w-W[i]}`);
                        c.onmouseenter = () => showDPFlow(i, w, sources);
                        c.onmouseleave = clearDPFlow;
                    }
                    if (document.getElementById('dp-viz').classList.contains('iso-3d') && v > 0) c.style.transform = `translateZ(${v*10}px)`; 
                    table.appendChild(c); 
                }); 
            });
            viz.appendChild(table);
        }

        function drawLCSGrid(s1, s2, grid, curI, curJ) {
            const viz = document.getElementById('dp-viz'); if (!viz) return;
            viz.innerHTML = `<div class="section-label" style="text-align:center;">Comparing "${s1}" vs "${s2}"</div>`;
            const cols = s2.length + 2;
            const table = document.createElement('div'); table.className = 'dp-table'; table.style.gridTemplateColumns = `repeat(${cols},40px)`;
            // Header row
            const corner = document.createElement('div'); corner.className = 'dp-cell header'; corner.textContent = ''; table.appendChild(corner);
            const emptyH = document.createElement('div'); emptyH.className = 'dp-cell header'; emptyH.textContent = '-'; table.appendChild(emptyH);
            for (let j = 0; j < s2.length; j++) { const c = document.createElement('div'); c.className = 'dp-cell header'; c.textContent = s2[j]; table.appendChild(c); }
            // Grid rows
            for (let i = 0; i <= s1.length; i++) {
                const lbl = document.createElement('div'); lbl.className = 'dp-cell header'; lbl.textContent = i === 0 ? '-' : s1[i - 1]; table.appendChild(lbl);
                for (let j = 0; j <= s2.length; j++) {
                    const c = document.createElement('div'); 
                    c.id = `dp-cell-${i}-${j}`;
                    c.className = 'dp-cell' + (i === curI && j === curJ ? ' current' : grid[i][j] > 0 ? ' filled' : '');
                    c.textContent = grid[i][j];
                    
                    if (i > 0 && j > 0) {
                        let sources = [];
                        if (s1[i-1] === s2[j-1]) sources.push(`${i-1},${j-1}`);
                        else sources.push(`${i-1},${j}`, `${i},${j-1}`);
                        c.onmouseenter = () => showDPFlow(i, j, sources);
                        c.onmouseleave = clearDPFlow;
                    }

                    if (document.getElementById('dp-viz').classList.contains('iso-3d') && grid[i][j] > 0) c.style.transform = `translateZ(${grid[i][j]*20}px)`;
                    table.appendChild(c);
                }
            }
            viz.appendChild(table);
        }

        function showDPFlow(ti, tj, sources) {
            const viz = document.getElementById('dp-viz');
            if (!viz || viz.classList.contains('iso-3d')) return; // Disable in 3D for coordinate simplicity
            
            clearDPFlow();
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.id = "dp-flow-svg";
            svg.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; overflow:visible;";
            
            const target = document.getElementById(`dp-cell-${ti}-${tj}`);
            if (!target) return;
            
            const vRect = viz.getBoundingClientRect();
            const tRect = target.getBoundingClientRect();
            const tx = tRect.left - vRect.left + tRect.width / 2;
            const ty = tRect.top - vRect.top + tRect.height / 2;
            
            sources.forEach(src => {
                const [si, sj] = src.split(',').map(Number);
                const source = document.getElementById(`dp-cell-${si}-${sj}`);
                if (!source) return;
                
                const sRect = source.getBoundingClientRect();
                const sx = sRect.left - vRect.left + sRect.width / 2;
                const sy = sRect.top - vRect.top + sRect.height / 2;
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const ctrlX = (sx + tx) / 2;
                const ctrlY = (sy + ty) / 2;
                path.setAttribute("d", `M ${sx} ${sy} Q ${ctrlX} ${ty} ${tx} ${ty}`);
                path.setAttribute("fill", "none");
                path.setAttribute("stroke", "var(--accent)");
                path.setAttribute("stroke-width", "3");
                path.setAttribute("stroke-linecap", "round");
                path.style.filter = "drop-shadow(0 0 5px var(--accent))";
                path.style.opacity = "0";
                path.style.transition = "opacity 0.3s ease";
                
                // Add arrowhead
                const marker = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                marker.setAttribute("cx", sx); marker.setAttribute("cy", sy); marker.setAttribute("r", "4"); marker.setAttribute("fill", "var(--accent3)");
                
                svg.appendChild(path);
                svg.appendChild(marker);
                setTimeout(() => path.style.opacity = "0.8", 10);
            });
            viz.style.position = "relative";
            viz.appendChild(svg);
        }

        function clearDPFlow() {
            const oldFlows = document.querySelectorAll('#dp-flow-svg');
            oldFlows.forEach(f => f.remove());
        }

        function drawStairsTable(dp, cur) {
            const viz = document.getElementById('dp-viz'); if (!viz) return;
            viz.innerHTML = '<div class="section-label" style="text-align:left; margin-left: 20px;">Logic: ways[i] = ways[i-1] + ways[i-2]</div>';
            const row = document.createElement('div'); row.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;justify-content:center;';
            dp.forEach((v, i) => {
                const cell = document.createElement('div'); cell.className = 'dp-cell' + (i === cur ? ' current' : v !== null ? ' filled' : '');
                cell.style.flexDirection = 'column'; cell.style.height = '54px'; cell.style.width = '54px';
                cell.innerHTML = `<span style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:2px;">\ud83e\ude9c${i}</span><span style="color:${v !== null ? '#fff' : 'inherit'}">${v ?? '-'}</span>`;
                row.appendChild(cell);
            });
            viz.appendChild(row);
        }

        async function runDP() {
            if (animating) return; animating = true;
            resetMetrics();
            if (dpAlgo === 'fib') {
                updatePIP('fib', 0);
                const dp = Array(10).fill(null); dp[0] = 0; dp[1] = 1;
                Metrics.writes += 2; updateTelemetry();
                drawFibTable(dp, 1); await DELAY(speedMs);
                for (let i = 2; i < 10 && animating; i++) { 
                    updatePIP('fib', 1);
                    dp[i] = dp[i - 1] + dp[i - 2]; 
                    Metrics.writes++; updateTelemetry();
                    updatePIP('fib', 2);
                    updateLogText(`Engine computing index ${i} => F(${i - 1})[${dp[i - 1]}] + F(${i - 2})[${dp[i - 2]}] = ${dp[i]}`); 
                    drawFibTable(dp, i); await DELAY(speedMs); 
                }
                updatePIP('fib', 3);
                updateLogText(`Compilation completed. Final sequence vector generated.`);
            } else if (dpAlgo === 'lis') {
                const arr = [4, 2, 8, 5, 1, 9, 3, 6], dp = Array(8).fill(1);
                for (let i = 1; i < arr.length && animating; i++) { for (let j = 0; j < i && animating; j++) { updateLogText(`Validating condition: arr[${j}]=${arr[j]} < arr[${i}]=${arr[i]} ? → ${arr[j] < arr[i] ? 'PASS (increment sequence)' : 'FAIL'}`); drawLISTable(arr, dp, i); await DELAY(speedMs / 1.5); if (arr[j] < arr[i]) dp[i] = Math.max(dp[i], dp[j] + 1); } }
                drawLISTable(arr, dp, -1); updateLogText(`Scanning sequence complete. Maximum scalar chain discovered = ${Math.max(...dp)}.`);
            } else if (dpAlgo === 'knapsack') {
                const W = [0, 2, 3, 4], V = [0, 3, 4, 5], cap = 6;
                const grid = Array(4).fill(null).map(() => Array(7).fill(0));
                for (let i = 1; i <= 3 && animating; i++) { 
                    updatePIP('knapsack', 0);
                    for (let w = 0; w <= cap && animating; w++) { 
                        updatePIP('knapsack', 1); updatePIP('knapsack', 2);
                        Metrics.compares++; updateTelemetry();
                        if (W[i] <= w) {
                            grid[i][w] = Math.max(grid[i - 1][w], V[i] + grid[i - 1][w - W[i]]);
                            Metrics.writes++; updateTelemetry();
                            updatePIP('knapsack', 3);
                        } else {
                            grid[i][w] = grid[i - 1][w];
                            Metrics.writes++; updateTelemetry();
                            updatePIP('knapsack', 4); updatePIP('knapsack', 5);
                        }
                        updateLogText(`Analyzing Entity ${i} (W=${W[i]},V=${V[i]}): Matrix slot DP[${i}][${w}] assigned optimized value ${grid[i][w]}`); 
                        drawKnapsackGrid(grid, i, w); await DELAY(speedMs / 2); 
                    } 
                }
                updateLogText(`Matrix resolved. Absolute maximum theoretical value = ${grid[3][6]} under capacity limit ${cap}.`);
            } else if (dpAlgo === 'lcs') {
                const s1 = 'ABCDE', s2 = 'ACE';
                const m = s1.length, n = s2.length;
                const grid = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
                for (let i = 1; i <= m && animating; i++) {
                    for (let j = 1; j <= n && animating; j++) {
                        if (s1[i - 1] === s2[j - 1]) {
                            grid[i][j] = grid[i - 1][j - 1] + 1;
                            updateLogText(`Match! '${s1[i - 1]}' == '${s2[j - 1]}' → dp[${i}][${j}] = ${grid[i][j]}`);
                        } else {
                            grid[i][j] = Math.max(grid[i - 1][j], grid[i][j - 1]);
                            updateLogText(`No match '${s1[i - 1]}' ≠ '${s2[j - 1]}' → dp[${i}][${j}] = max(${grid[i - 1][j]}, ${grid[i][j - 1]}) = ${grid[i][j]}`);
                        }
                        drawLCSGrid(s1, s2, grid, i, j);
                        await DELAY(speedMs / 2);
                    }
                }
                updateLogText(`LCS length = ${grid[m][n]}. The longest common subsequence of "${s1}" and "${s2}" has ${grid[m][n]} characters.`);
            } else if (dpAlgo === 'stairs') {
                const dp = Array(8).fill(null); dp[0] = 1; dp[1] = 1;
                drawStairsTable(dp, 1); await DELAY(speedMs);
                for (let i = 2; i < 8 && animating; i++) {
                    dp[i] = dp[i - 1] + dp[i - 2];
                    updateLogText(`Ways to step ${i} = ways(${i - 1}) + ways(${i - 2}) = ${dp[i - 1]} + ${dp[i - 2]} = ${dp[i]}`);
                    drawStairsTable(dp, i);
                    await DELAY(speedMs);
                }
                updateLogText(`Climbing Stairs complete. Ways to reach step 7 = ${dp[7]}`);
            }
            animating = false;
        }

        function setPattern(m) {

            const configs = {
                twopointers: { title: 'Pattern: Two Pointers', desc: 'Uses two markers to process array items efficiently, often narrowing down a search space.' },
                sliding: { title: 'Pattern: Sliding Window', desc: 'Maintains a sub-segment of the array to calculate local properties as it moves forward.' },
                backtrack: { title: 'Pattern: N-Queens (Backtracking)', desc: 'Systematically explores solutions by placing items and undoing choices if they fail.' },
                greedy: { title: 'Pattern: Coin Change (Greedy)', desc: 'Always selects the largest possible denomination to reach the target amount quickly.' },
                hanoi: { title: 'Pattern: Tower of Hanoi', desc: 'Recursive strategy for moving n disks between 3 pegs with strict hierarchy rules.' },
                prefix: { title: 'Pattern: Prefix Sums', desc: 'Pre-computes running totals to allow constant-time O(1) range sum queries.' },
                fastslow: { title: 'Pattern: Fast & Slow Pointers', desc: "Move pointers at different speeds (Tortoise & Hare) to detect cycles or find middle elements." }
            };
            const c = configs[m];

            if (m === 'twopointers') drawPatternArr([2, 5, 8, 12, 16, 23, 38, 56, 72, 91], 0, 9);

            else if (m === 'backtrack') drawNQueensGrid([], -1, -1);
            else if (m === 'greedy') drawCoins(87, { 25: 0, 10: 0, 5: 0, 1: 0 }, [25, 10, 5, 1]);
            else if (m === 'hanoi') drawHanoi({ A: [3, 2, 1], B: [], C: [] });
            else if (m === 'prefix') drawPrefixSum([2, 4, 1, 3, 5, 2, 1], Array(7).fill(null), -1);
            else if (m === 'fastslow') drawFastSlow([1, 3, 5, 7, 9, 11, 13, 5], 0, 0);

            updateConceptUI(m);

                    if (i === R) c.innerHTML += `<div style="position:absolute; bottom:-30px; font-size:14px; font-weight:800; color:var(--accent2); text-shadow:0 0 10px var(--accent2);">R</div>`;

        async function runPattern() {
            if (animating) return; animating = true;
            resetMetrics();
            const target = +document.getElementById('pat-val').value;
            if (patAlgo === 'twopointers') {
                updatePIP('twopointers', 0);
                const arr = [2, 5, 8, 12, 16, 23, 38, 56, 72, 91];
                let L = 0, R = arr.length - 1;
                updatePIP('twopointers', 1);
                updateLogText(`Target Sum = ${target}. Starting Two Pointers.`);
                while (L < R && animating) {
                    drawPatternArr(arr, L, R);
                    updatePIP('twopointers', 2);
                    let sum = arr[L] + arr[R];
                    updateLogText(`Checking L(${arr[L]}) + R(${arr[R]}) = ${sum}`);
                    Metrics.compares++; updateTelemetry();
                    await DELAY(speedMs);
                    if (sum === target) {
                        updatePIP('twopointers', 3);
                        drawPatternArr(arr, L, R, [L, R]);
                        updateLogText(`✓ Found target ${target} at indices ${L} and ${R}!`);
                        animating = false; return;
                    } else if (sum < target) {
                        updatePIP('twopointers', 4);
                        Metrics.compares++; updateTelemetry();
                        updateLogText(`${sum} < ${target}. Moving Left pointer +1.`);
                        L++;
                    } else {
                        updatePIP('twopointers', 5);
                        Metrics.compares++; updateTelemetry();
                        updateLogText(`${sum} > ${target}. Moving Right pointer -1.`);
                        R--;
                    }
                    await DELAY(speedMs / 2);
                }
                if (L >= R) updateLogText(`✗ Search failed. Target ${target} not found.`);
            } else if (patAlgo === 'sliding') {
                updatePIP('sliding', 0);
                const arr = [4, 2, 1, 7, 8, 1, 2, 8, 1, 0];
                const K = target || 3;
                let maxSum = 0, currentSum = 0;
                let bestL = 0;
                if (K > arr.length) { updateLogText("Error: Window size K exceeds array length."); animating = false; return; }
                for (let i = 0; i < K; i++) { currentSum += arr[i]; Metrics.writes++; updateTelemetry(); }
                updatePIP('sliding', 1);
                maxSum = currentSum;
                updatePIP('sliding', 2);
                updateLogText(`Initial window [0-${K - 1}] sum = ${currentSum}`);
                drawPatternArr(arr, 0, K - 1, [], true);
                await DELAY(speedMs * 1.5);

                for (let i = K; i < arr.length && animating; i++) {
                    updatePIP('sliding', 3);
                    currentSum = currentSum - arr[i - K] + arr[i];
                    Metrics.writes++; updateTelemetry();
                    updatePIP('sliding', 4);
                    Metrics.compares++; updateTelemetry();
                    if (currentSum > maxSum) {
                        maxSum = currentSum;
                        bestL = i - K + 1;
                    }
                    drawPatternArr(arr, i - K + 1, i, [], true);
                    updateLogText(`Slid to [${i - K + 1} to ${i}]. -${arr[i - K]} +${arr[i]} = Sum: ${currentSum}. Max: ${maxSum}`);
                    await DELAY(speedMs * 1.5);
                }
                updatePIP('sliding', 5);
                drawPatternArr(arr, bestL, bestL + K - 1, Array.from({ length: K }, (_, i) => bestL + i), true);
                updateLogText(`✓ Completed. Maximum sum of size ${K} is ${maxSum}.`);
            } else if (patAlgo === 'backtrack') {
                const N = 4;
                const queens = [];
                let solved = false;
                function isSafe(q, r, c) { for (let i = 0; i < r; i++) { if (q[i] === c || Math.abs(q[i] - c) === Math.abs(i - r)) return false; } return true; }
                async function solve(row) {
                    if (!animating) return false;
                    if (row === N) { solved = true; return true; }
                    for (let col = 0; col < N; col++) {
                        if (!animating) return false;
                        drawNQueensGrid(queens, row, col); updateLogText(`Evaluating Queen: row ${row}, col ${col}`); await DELAY(speedMs);
                        if (isSafe(queens, row, col)) {
                            queens.push(col); drawNQueensGrid(queens, -1, -1); updateLogText(`Safe! Placed @ row ${row}, col ${col}`); await DELAY(speedMs / 2);
                            if (await solve(row + 1)) return true;
                            if (!animating) return false;
                            let rc = queens.pop(); drawNQueensGrid(queens, row, rc); updateLogText(`Backtracking row ${row}`); await DELAY(speedMs);
                        }
                    } return false;
                }
                await solve(0);
                if (solved) { drawNQueensGrid(queens, -1, -1); updateLogText("✓ N-Queens Solved!"); }
            } else if (patAlgo === 'greedy') {
                let amount = target || 87;
                const coins = [25, 10, 5, 1];
                const counts = { 25: 0, 10: 0, 5: 0, 1: 0 };
                updateLogText(`Target amount: ${amount}. Starting greedy coin selection.`);
                drawCoins(amount, counts, coins);
                await DELAY(speedMs);

                for (let c of coins) {
                    if (!animating) break;
                    updateLogText(`Trying coin denomination: ${c}`);
                    await DELAY(speedMs);
                    while (amount >= c && animating) {
                        amount -= c;
                        counts[c]++;
                        drawCoins(amount, counts, coins);
                        updateLogText(`Added ${c} coin. Remaining amount: ${amount}`);
                        await DELAY(speedMs);
                    }
                }
                if (animating) {
                    updateLogText(`Change made perfectly using greedy algorithm.`);
                }
            } else if (patAlgo === 'hanoi') {
                const pegs = { A: [3, 2, 1], B: [], C: [] };
                drawHanoi(pegs);
                async function moveHanoi(n, from, to, aux) {
                    if (n === 0 || !animating) return;
                    await moveHanoi(n - 1, from, aux, to);
                    if (!animating) return;
                    const disk = pegs[from].pop();
                    pegs[to].push(disk);
                    drawHanoi(pegs);
                    updateLogText(`Move disk ${disk} from peg ${from} → peg ${to}`);
                    await DELAY(speedMs);
                    await moveHanoi(n - 1, aux, to, from);
                }
                await moveHanoi(3, 'A', 'C', 'B');
                if (animating) updateLogText('Tower of Hanoi solved! All disks moved to peg C.');
            } else if (patAlgo === 'prefix') {
                const arr = [2, 4, 1, 3, 5, 2, 1];
                const prefix = Array(arr.length).fill(null);
                prefix[0] = arr[0];
                drawPrefixSum(arr, prefix, 0);
                updateLogText(`prefix[0] = arr[0] = ${arr[0]}`);
                await DELAY(speedMs);
                for (let i = 1; i < arr.length && animating; i++) {
                    prefix[i] = prefix[i - 1] + arr[i];
                    drawPrefixSum(arr, prefix, i);
                    updateLogText(`prefix[${i}] = prefix[${i - 1}] + arr[${i}] = ${prefix[i - 1]} + ${arr[i]} = ${prefix[i]}`);
                    await DELAY(speedMs);
                }
                if (animating) {
                    const l = 2, r = 5;
                    const rangeSum = prefix[r] - (l > 0 ? prefix[l - 1] : 0);
                    updateLogText(`Example query: sum(${l}..${r}) = prefix[${r}] - prefix[${l - 1}] = ${prefix[r]} - ${prefix[l - 1]} = ${rangeSum}`);
                }
            } else if (patAlgo === 'fastslow') {
                const arr = [1, 3, 5, 7, 9, 11, 13, 5];
                let slow = 0, fast = 0;
                updateLogText('Starting cycle detection. Slow moves 1 step, Fast moves 2 steps.');
                drawFastSlow(arr, slow, fast);
                await DELAY(speedMs);
                while (animating) {
                    slow = (slow + 1) % arr.length;
                    fast = (fast + 2) % arr.length;
                    drawFastSlow(arr, slow, fast);
                    updateLogText(`Slow → index ${slow} (val ${arr[slow]}), Fast → index ${fast} (val ${arr[fast]})`);
                    await DELAY(speedMs);
                    if (slow === fast) {
                        drawFastSlow(arr, slow, fast);
                        updateLogText(`✓ Cycle detected! Slow and Fast met at index ${slow}. Cycle exists.`);
                        break;
                    }
                    if (fast >= arr.length - 1) {
                        updateLogText('No cycle detected.');
                        break;
                    }
                }
            }
            animating = false;
        }

        /* ===== Tower of Hanoi ===== */
        function drawHanoi(pegs) {
            const viz = document.getElementById('pat-viz'); if (!viz) return;
            viz.innerHTML = '';
            const wrap = document.createElement('div');
            wrap.style.cssText = 'display:flex; gap:40px; align-items:flex-end; justify-content:center; width:100%;';
            ['A', 'B', 'C'].forEach(peg => {
                const col = document.createElement('div');
                col.style.cssText = 'display:flex; flex-direction:column-reverse; align-items:center; gap:4px; min-height:120px; min-width:110px; position:relative;';
                const base = document.createElement('div');
                base.style.cssText = 'width:110px; height:4px; background:rgba(255,255,255,0.2); border-radius:2px;';
                const pole = document.createElement('div');
                pole.style.cssText = 'position:absolute; bottom:4px; width:4px; height:100px; background:rgba(255,255,255,0.1); border-radius:2px;';
                col.appendChild(base);
                col.appendChild(pole);
                const colors = ['var(--accent)', 'var(--accent2)', 'var(--accent3)'];
                (pegs[peg] || []).forEach((disk, i) => {
                    const d = document.createElement('div');
                    const w = 40 + disk * 22;
                    d.style.cssText = `width:${w}px; height:24px; border-radius:8px; background:${colors[disk - 1]}; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:800; font-size:13px; color:#000; box-shadow:0 4px 10px rgba(0,0,0,0.4); z-index:1;`;
                    d.textContent = disk;
                    col.appendChild(d);

        const PIP_CODES = {
            'bubble': "for i in range(len(arr)):\n  for j in range(len(arr)-i-1):\n    if arr[j] > arr[j+1]:\n      arr[j], arr[j+1] = arr[j+1], arr[j]",
            'selection': "for i in range(len(arr)):\n  min_idx = i\n  for j in range(i+1, len(arr)):\n    if arr[j] < arr[min_idx]:\n      min_idx = j\n  arr[i], arr[min_idx] = arr[min_idx], arr[i]",
            'insertion': "for i in range(1, len(arr)):\n  key = arr[i]\n  j = i - 1\n  while j >= 0 and key < arr[j]:\n    arr[j + 1] = arr[j]\n    j -= 1\n  arr[j + 1] = key",
            'merge': "def mergeSort(arr, l, r):\n  if l < r:\n    m = (l + r) // 2\n    mergeSort(arr, l, m)\n    mergeSort(arr, m + 1, r)\n    merge(arr, l, m, r)",
            'quick': "def quicksort(arr, lo, hi):\n  if lo < hi:\n    pi = partition(arr, lo, hi)\n    quicksort(arr, lo, pi-1)\n    quicksort(arr, pi+1, hi)",
            'heap': "def heapify(arr, n, i):\n  largest = i\n  if l < n and arr[l] > arr[largest]:...\n  if largest != i:\n    arr[i], arr[largest] = arr[largest], arr[i]\n    heapify(arr, n, largest)",
            'counting': "count = [0] * (max(arr) + 1)\nfor x in arr:\n  count[x] += 1\nidx = 0\nfor i, c in enumerate(count):\n  while c > 0:\n    arr[idx] = i; idx += 1; c -= 1",
            'linear': "for i in range(len(arr)):\n  if arr[i] == target:\n    return i\nreturn -1",
            'binary': "lo, hi = 0, len(arr)-1\nwhile lo <= hi:\n  mid = (lo + hi) // 2\n  if arr[mid] == target: return mid\n  elif arr[mid] < target: lo = mid + 1\n  else: hi = mid - 1\nreturn -1",
            'bfs': "queue = [start_node]\nvisited.add(start_node)\nwhile queue:\n  curr = queue.pop(0)\n  for neighbor in graph[curr]:\n    if neighbor not in visited:\n      visited.add(neighbor)\n      queue.append(neighbor)",
            'dfs': "def dfs(node):\n  if node in visited: return\n  visited.add(node)\n  for neighbor in graph[node]:\n    dfs(neighbor)\ndfs(start_node)",
            'dijkstra': "dist[start] = 0\nwhile unvisited:\n  u = get_min_dist_node(unvisited)\n  unvisited.remove(u)\n  for v, weight in graph[u]:\n    if dist[u] + weight < dist[v]:\n      dist[v] = dist[u] + weight",
            'fib': "dp[0] = 0; dp[1] = 1\nfor i in range(2, n+1):\n  dp[i] = dp[i-1] + dp[i-2]\nreturn dp[n]",
            'knapsack': "for i in range(1, items+1):\n  for w in range(capacity+1):\n    if weight[i] <= w:\n      dp[i][w] = max(dp[i-1][w], val[i] + dp[i-1][w-weight[i]])\n    else:\n      dp[i][w] = dp[i-1][w]",
            'twopointers': "L, R = 0, len(arr)-1\nwhile L < R:\n  curr_sum = arr[L] + arr[R]\n  if curr_sum == target: return [L, R]\n  elif curr_sum < target: L += 1\n  else: R -= 1",
            'sliding': "for i in range(k): window_sum += arr[i]\nmax_sum = window_sum\nfor i in range(k, len(arr)):\n  window_sum += arr[i] - arr[i-k]\n  max_sum = max(max_sum, window_sum)\nreturn max_sum"
        };
        function updatePIP(algo, activeLine) {

        function drawRaceBars(arr, vizId, highlights = [], compares = [], sorted = []) {
            const viz = document.getElementById(vizId);
            if (!viz) return;

        async function raceAlgo(algo, arr, vizId) {
            let sorted = [];
            if (algo === 'bubble') {
                for (let i = 0; i < arr.length && animating; i++) {
                    for (let j = 0; j < arr.length - i - 1 && animating; j++) {
                        drawRaceBars(arr, vizId, [j], [j+1], Array.from({length:i}, (_,k)=>arr.length-1-k));
                        await DELAY(speedMs);
                        if (arr[j] > arr[j+1]) { [arr[j], arr[j+1]] = [arr[j+1], arr[j]]; drawRaceBars(arr, vizId, [j+1], [j], Array.from({length:i}, (_,k)=>arr.length-1-k)); await DELAY(speedMs/2); }
                    }
                    sorted.push(arr.length - 1 - i);
                }
            } else if (algo === 'selection') {
                for (let i = 0; i < arr.length && animating; i++) {
                    let min = i;
                    for (let j = i + 1; j < arr.length && animating; j++) {
                        drawRaceBars(arr, vizId, [min], [j], [...sorted]); await DELAY(speedMs);
                        if (arr[j] < arr[min]) min = j;
                    }
                    [arr[i], arr[min]] = [arr[min], arr[i]]; sorted.push(i);
                    drawRaceBars(arr, vizId, [], [], [...sorted]); await DELAY(speedMs);
                }
            } else if (algo === 'insertion') {
                for (let i = 1; i < arr.length && animating; i++) {
                    let key = arr[i], j = i - 1;
                    while (j >= 0 && arr[j] > key && animating) {
                        arr[j + 1] = arr[j]; j--;
                        drawRaceBars(arr, vizId, [j + 1], [i], []); await DELAY(speedMs);
                    }
                    arr[j + 1] = key;
                    drawRaceBars(arr, vizId, [j + 1], [], []); await DELAY(speedMs/2);
                }
            } else if (algo === 'merge') {
                async function merge(a, l, m, r) {
                    let left = a.slice(l, m + 1), right = a.slice(m + 1, r + 1), i = 0, j = 0, k = l;
                    while (i < left.length && j < right.length && animating) {
                        drawRaceBars(a, vizId, [k], [], []); await DELAY(speedMs);
                        if (left[i] <= right[j]) a[k++] = left[i++]; else a[k++] = right[j++];
                    }
                    while (i < left.length) a[k++] = left[i++];
                    while (j < right.length) a[k++] = right[j++];
                }
                async function mergeSort(a, l, r) {
                    if (l >= r || !animating) return;
                    let m = Math.floor((l + r) / 2);
                    await mergeSort(a, l, m); await mergeSort(a, m + 1, r);
                    await merge(a, l, m, r);
                    drawRaceBars(a, vizId, [], [], []); await DELAY(speedMs/2);
                }
                await mergeSort(arr, 0, arr.length - 1);
            } else if (algo === 'quick') {
                async function split(lo, hi) {
                    if (lo >= hi || !animating) { if (lo === hi) sorted.push(lo); return; }
                    let p = arr[hi], j = lo;
                    for (let i=lo; i<hi && animating; i++) {
                        drawRaceBars(arr, vizId, [i], [hi], [...sorted]); await DELAY(speedMs);
                        if (arr[i] < p) { [arr[i], arr[j]] = [arr[j], arr[i]]; j++; drawRaceBars(arr, vizId, [j-1], [hi], [...sorted]); await DELAY(speedMs/2); }
                    }
                    [arr[j], arr[hi]] = [arr[hi], arr[j]]; sorted.push(j);
                    drawRaceBars(arr, vizId, [], [], [...sorted]); await DELAY(speedMs);
                    await split(lo, j-1); await split(j+1, hi);
                }
                await split(0, arr.length-1);
            } else if (algo === 'heap') {
                async function heapify(a, n, i) {
                    let largest = i, l = 2 * i + 1, r = 2 * i + 2;
                    if (l < n && a[l] > a[largest]) largest = l;
                    if (r < n && a[r] > a[largest]) largest = r;
                    if (largest !== i) { [a[i], a[largest]] = [a[largest], a[i]]; drawRaceBars(a, vizId, [i, largest], [], [...sorted]); await DELAY(speedMs); await heapify(a, n, largest); }
                }
                for (let i = Math.floor(arr.length / 2) - 1; i >= 0 && animating; i--) await heapify(arr, arr.length, i);
                for (let i = arr.length - 1; i > 0 && animating; i--) {
                    [arr[0], arr[i]] = [arr[i], arr[0]]; sorted.push(i);
                    drawRaceBars(arr, vizId, [0], [], [...sorted]); await DELAY(speedMs);
                    await heapify(arr, i, 0);
                }
            } else if (algo === 'counting') {
                const max = Math.max(...arr);
                const count = Array(max + 1).fill(0);
                for (let i = 0; i < arr.length && animating; i++) {
                    count[arr[i]]++;
                    drawRaceBars(arr, vizId, [i], [], []); await DELAY(speedMs);
                }
                let idx = 0;
                for (let v = 0; v <= max && animating; v++) {
                    for (let c = 0; c < count[v] && animating; c++) {
                        arr[idx] = v;
                        drawRaceBars(arr, vizId, [idx], [], Array.from({ length: idx }, (_, i) => i));
                        await DELAY(speedMs); idx++;
                    }
                }
            }
            drawRaceBars(arr, vizId, [], [], Array.from({length:arr.length},(_,i)=>i));
        }

            document.getElementById('stress-bar-bubble').style.height = '0px';
            document.getElementById('stress-bar-quick').style.height = '0px';
            
            log.textContent = `Generating array of ${n} random elements...`;
            await new Promise(r => setTimeout(r, 50));
            const arr1 = Array.from({length: n}, () => Math.random());
            const arr2 = [...arr1];
            
            log.textContent = `Running nested Bubble Sort (O(N²)). Main thread locking mapped...`;
            await new Promise(r => setTimeout(r, 100)); // allow repaint
            
            const t0 = performance.now();
            // Blocking iteration
            for(let i=0; i<n; i++) {
                for(let j=0; j<n-i-1; j++) {
                    if(arr1[j] > arr1[j+1]) { let t=arr1[j]; arr1[j]=arr1[j+1]; arr1[j+1]=t; }
                }
            }
            const t1 = performance.now();
            const bubbleTime = (t1-t0).toFixed(2);
            
            log.textContent = `Bubble Sort mapped. Running internal Quick Sort (O(N log N))...`;
            await new Promise(r => setTimeout(r, 50));

            arr2.sort((a,b) => a-b);
            const t3 = performance.now();
            const quickTime = (t3-t2).toFixed(2);

            log.textContent = `Benchmark Complete! N=${n} | Bubble: ${bubbleTime}ms | Quick/TimSort: ${quickTime}ms`;

                <option value="heap">Heap Sort (O(n log n))</option>
                <option value="counting">Counting Sort (O(n+k))</option>
             </select>
             <div class="viz-area" id="race-viz-1" style="min-height:200px; margin:0; box-shadow:none;"></div>
          </div>
          <div style="flex:1; min-width:300px; background:rgba(0,0,0,0.2); padding:20px; border-radius:16px; border:1px solid rgba(255,255,255,0.05);">
             <select id="race-algo-2" style="width:100%; padding:10px; border-radius:8px; background:#1b163d; color:#fff; border:1px solid var(--accent2); outline:none; font-family:var(--font-head); font-weight:600; font-size:14px; margin-bottom:15px;" onchange="animating=false; drawRaceBars(raceArr,'race-viz-2')">
                <option value="bubble">Bubble Sort (O(n²))</option>
                <option value="selection">Selection Sort (O(n²))</option>
                <option value="insertion">Insertion Sort (O(n²))</option>
                <option value="merge">Merge Sort (O(n log n))</option>
                <option value="quick" selected>Quick Sort (O(n log n))</option>
                <option value="heap">Heap Sort (O(n log n))</option>
                <option value="counting">Counting Sort (O(n+k))</option>
             </select>
             <div class="viz-area" id="race-viz-2" style="min-height:200px; margin:0; box-shadow:none;"></div>
          </div>
      </div>
      <div class="controls" style="margin-top:20px;">
        <button class="btn primary" onclick="execTT(executeRace)">🏁 Start Race</button>
        <button class="btn" onclick="animating=false; drawRaceBars(raceArr,'race-viz-1'); drawRaceBars(raceArr,'race-viz-2');">↺ Reset</button>
        <button class="btn" onclick="animating=false; raceArr=[...raceArr].sort(()=>Math.random()-0.5); document.querySelectorAll('.viz-area').forEach(el=>el.innerHTML=''); drawRaceBars(raceArr,'race-viz-1'); drawRaceBars(raceArr,'race-viz-2');">⤮ Shuffle</button>
        <div class="speed-row">Speed: <input type="range" class="speed" min="50" max="800" value="400" oninput="speedMs=800-this.value+50; if(Scrubber.timer) Scrubber.play(speedMs);"></div>
      </div>
      <div class="log" id="race-log">Select competitors and Start Race!</div>
    </div>`;
            demoArea.replaceWith(wrapper.firstElementChild);
            drawRaceBars(raceArr, 'race-viz-1');
            drawRaceBars(raceArr, 'race-viz-2');
        }

        renderSorting();
    </script>
</body>

</html>
